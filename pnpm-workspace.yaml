packages:
  - apps/*
  - packages/*
  - tools/*

allowBuilds:
  better-sqlite3: true
  esbuild: true
  sharp: true
  unrs-resolver: true
  wasm-pack: true
  workerd: true

catalogMode: prefer

catalog:
  '@types/node': ^24
  typescript: ^6.0.0
  vite: npm:@voidzero-dev/vite-plus-core@0.2.1
  vue: ^3.5.39
  '@vitejs/plugin-vue': ^6.0.7
  monaco-editor: ^0.55.1
  vize: ^0.262.0
  void: ^0.9.3
  vite-plus: 0.2.1
  '@kazupon/vp-config': ^0.5.1
  wasm-pack: 0.15.0
  bumpp: ^11.1.0
  gh-changelogen: ^0.2.8
  pkg-pr-new: 0.0.75
overrides:
  vite: 'catalog:'
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: '*'
    vitest: '*'
minimumReleaseAgeExclude:
  - vize
  - '@vizejs/**'
  - '@vue/compiler-core@3.5.39'
  - '@vue/compiler-dom@3.5.39'
  - '@vue/compiler-sfc@3.5.39'
  - '@vue/compiler-ssr@3.5.39'
  - '@vue/reactivity@3.5.39'
  - '@vue/runtime-core@3.5.39'
  - '@vue/runtime-dom@3.5.39'
  - '@vue/server-renderer@3.5.39'
  - '@vue/shared@3.5.39'
  - vue@3.5.39
  - '@kazupon/vp-config@0.5.1'
