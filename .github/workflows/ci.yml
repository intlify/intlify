name: CI

env:
  CI: true
  CARGO_TERM_COLOR: always

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint:
    runs-on: ${{ matrix.os }}
    name: Lint (${{ matrix.os }})
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout codes
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Vite Plus
        uses: voidzero-dev/setup-vp@2dec1e33f4ab2c6d5bce1b0c4607961bb1a3f7a1 # v1.12.0
        with:
          node-version: 22.13
          cache: true
          run-install: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: '1.96.0'
          components: rustfmt, clippy

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Setup cargo cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4

      - name: Build packages
        run: vp run -r build

      - name: Check
        if: matrix.os != 'windows-latest'
        run: vp run check

      - name: Check Rust headers
        if: matrix.os == 'windows-latest'
        run: node scripts/check-rust-headers.mjs

      - name: Check Rust format
        if: matrix.os == 'windows-latest'
        run: cargo fmt --all -- --check

      - name: Check Rust clippy
        if: matrix.os == 'windows-latest'
        run: cargo clippy --all-targets --color always

      - name: Check Rust compile
        if: matrix.os == 'windows-latest'
        run: cargo check --all-targets --color always

      - name: Check Vite Plus
        if: matrix.os == 'windows-latest'
        run: vp check

  test:
    runs-on: ${{ matrix.os }}
    name: Test (${{ matrix.os }})
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout codes
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Vite Plus
        uses: voidzero-dev/setup-vp@2dec1e33f4ab2c6d5bce1b0c4607961bb1a3f7a1 # v1.12.0
        with:
          node-version: 22.13
          cache: true
          run-install: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: '1.96.0'

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Setup cargo cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4

      - name: Build packages
        run: vp run -r build

      - name: Testing
        run: vp run -r test

  binding-package-smoke:
    runs-on: ubuntu-latest
    name: Binding package smoke
    steps:
      - name: Checkout codes
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Vite Plus
        uses: voidzero-dev/setup-vp@2dec1e33f4ab2c6d5bce1b0c4607961bb1a3f7a1 # v1.12.0
        with:
          node-version: 22.13
          cache: true
          run-install: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: '1.96.0'

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Setup cargo cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4

      - name: Build packages
        run: vp run -r build

      - name: Run binding package smoke
        run: vp run pack:bindings:smoke

  binding-benchmark-smoke:
    runs-on: ubuntu-latest
    name: Binding benchmark smoke
    steps:
      - name: Checkout codes
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Vite Plus
        uses: voidzero-dev/setup-vp@2dec1e33f4ab2c6d5bce1b0c4607961bb1a3f7a1 # v1.12.0
        with:
          node-version: 22.13
          cache: true
          run-install: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: '1.96.0'

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Setup cargo cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4

      - name: Install benchmark tools
        run: |
          sudo apt-get update
          sudo apt-get install -y hyperfine

      - name: Build packages
        run: vp run -r build

      - name: Run binding benchmark smoke
        run: vp run bench:bindings:smoke

  binding-benchmark-e2e-smoke:
    runs-on: ubuntu-latest
    name: Binding benchmark E2E smoke
    steps:
      - name: Checkout codes
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Vite Plus
        uses: voidzero-dev/setup-vp@2dec1e33f4ab2c6d5bce1b0c4607961bb1a3f7a1 # v1.12.0
        with:
          node-version: 22.13
          cache: true
          run-install: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: '1.96.0'

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Setup cargo cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4

      - name: Install browser
        run: npx --package @playwright/cli playwright-cli install-browser chromium

      - name: Build packages
        run: vp run -r build

      - name: Run binding benchmark E2E smoke
        run: vp run bench:bindings:e2e:smoke
