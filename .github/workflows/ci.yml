name: CI

env:
  CI: true
  CARGO_TERM_COLOR: always

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint:
    runs-on: ${{ matrix.os }}
    name: Lint (${{ matrix.os }})
    timeout-minutes: 20
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout codes
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Vite Plus
        uses: voidzero-dev/setup-vp@250f29ce396baf5e8f24498e17c0dfdebabc26eb # v1.15.0
        with:
          node-version: 24
          cache: true
          run-install: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: '1.97.0'
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Print Vite+ version
        run: vp --version

      - name: Setup cargo cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4

      - name: Build packages
        run: vp run -r build

      - name: Check
        run: vpr --no-cache -v check

  test:
    runs-on: ${{ matrix.os }}
    name: Test (${{ matrix.os }})
    timeout-minutes: 20
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout codes
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Vite Plus
        uses: voidzero-dev/setup-vp@250f29ce396baf5e8f24498e17c0dfdebabc26eb # v1.15.0
        with:
          node-version: 24
          cache: true
          run-install: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: '1.97.0'
          targets: wasm32-unknown-unknown

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Setup cargo cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4

      - name: Build packages
        run: vpr build

      - name: Testing
        env:
          VITE_LOG: vite_task=trace
        run: vpr --no-cache -v test

  cli-validation:
    runs-on: ${{ matrix.os }}
    name: CLI validation (${{ matrix.os }})
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Enable long paths
        if: runner.os == 'Windows'
        run: git config --system core.longpaths true

      - name: Checkout codes
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Vite Plus
        uses: voidzero-dev/setup-vp@250f29ce396baf5e8f24498e17c0dfdebabc26eb # v1.15.0
        with:
          node-version: 24
          cache: true
          run-install: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: '1.97.0'

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Setup cargo cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4

      - name: Build CLI
        run: vp run build:cli

      - name: Verify CLI schema
        run: vp run schema:cli:check

      - name: Test CLI crate
        run: cargo test -p intlify_cli --all-targets --color always

      - name: Check CLI package contents
        run: vp run check:cli-pack

      - name: Smoke test CLI package
        run: vp run test:cli-smoke

  binding-package-smoke:
    runs-on: ubuntu-latest
    name: Binding package smoke
    timeout-minutes: 15
    steps:
      - name: Checkout codes
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Vite Plus
        uses: voidzero-dev/setup-vp@250f29ce396baf5e8f24498e17c0dfdebabc26eb # v1.15.0
        with:
          node-version: 24
          cache: true
          run-install: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: '1.97.0'
          targets: wasm32-unknown-unknown

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Setup cargo cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4

      - name: Build packages
        run: vpr build

      - name: Run binding package smoke
        run: vp run pack:bindings:smoke

  binding-benchmark-smoke:
    runs-on: ubuntu-latest
    name: Binding benchmark smoke
    timeout-minutes: 20
    steps:
      - name: Checkout codes
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Vite Plus
        uses: voidzero-dev/setup-vp@250f29ce396baf5e8f24498e17c0dfdebabc26eb # v1.15.0
        with:
          node-version: 24
          cache: true
          run-install: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: '1.97.0'
          targets: wasm32-unknown-unknown

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Setup cargo cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4

      - name: Install benchmark tools
        run: |
          sudo apt-get update
          sudo apt-get install -y hyperfine

      - name: Build packages
        run: vpr build

      - name: Run binding benchmark smoke
        run: vp run bench:bindings:smoke

  binding-benchmark-e2e-smoke:
    runs-on: ubuntu-latest
    name: Binding benchmark E2E smoke
    timeout-minutes: 20
    steps:
      - name: Checkout codes
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Vite Plus
        uses: voidzero-dev/setup-vp@250f29ce396baf5e8f24498e17c0dfdebabc26eb # v1.15.0
        with:
          node-version: 24
          cache: true
          run-install: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: '1.97.0'
          targets: wasm32-unknown-unknown

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Setup cargo cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4

      - name: Install browser
        run: npx --yes playwright install --with-deps chromium

      - name: Build packages
        run: vpr build

      - name: Run binding benchmark E2E smoke
        run: vp run bench:bindings:e2e:smoke
