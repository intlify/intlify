name: Release

on:
  push:
    branches-ignore:
      - '**'
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      job:
        description: 'Which job(s) to run. `all` runs the full pipeline.'
        type: choice
        required: true
        default: all
        options:
          - all
          - npm-publish
          - published-smoke
          - release-notes
      tag:
        description: 'Existing tag to release, e.g. v0.1.0.'
        type: string
        required: true

env:
  CI: true
  CARGO_TERM_COLOR: always
  TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

permissions:
  contents: read

jobs:
  validate:
    name: Validate release tag
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: >-
      github.event_name == 'push' || (github.event_name == 'workflow_dispatch' &&
        (inputs.job == 'all' || inputs.job == 'npm-publish'))


    steps:
      - name: Checkout codes
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ env.TAG }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Vite Plus
        uses: voidzero-dev/setup-vp@2dec1e33f4ab2c6d5bce1b0c4607961bb1a3f7a1 # v1.12.0
        with:
          node-version: 24
          cache: true
          run-install: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: '1.96.0'
          components: rustfmt, clippy

      - name: Add wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Verify release version
        run: node scripts/check-release-version.mjs "$TAG"

      - name: Build packages
        run: vpr build

      - name: Check
        run: vpr --no-cache -v check

      - name: Test
        env:
          VITE_LOG: vite_task=trace
        run: vpr --no-cache -v test

      - name: Inspect package contents
        run: node scripts/inspect-binding-packages.mjs

  build-napi:
    name: Build @intlify/ox-mf2-napi (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    needs:
      - validate
    if: >-
      github.event_name == 'push' || (github.event_name == 'workflow_dispatch' &&
        (inputs.job == 'all' || inputs.job == 'npm-publish'))


    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: darwin-arm64
            target: aarch64-apple-darwin
            extra_args: ''
          - os: macos-latest
            label: darwin-x64
            target: x86_64-apple-darwin
            extra_args: ''
          - os: ubuntu-latest
            label: linux-x64-gnu
            target: x86_64-unknown-linux-gnu
            extra_args: '--use-napi-cross'
          - os: ubuntu-latest
            label: linux-x64-musl
            target: x86_64-unknown-linux-musl
            extra_args: '--use-napi-cross'
          - os: ubuntu-latest
            label: linux-arm64-gnu
            target: aarch64-unknown-linux-gnu
            extra_args: '--use-napi-cross'
          - os: windows-latest
            label: win32-x64-msvc
            target: x86_64-pc-windows-msvc
            extra_args: ''
    defaults:
      run:
        shell: bash
    steps:
      - name: Enable long paths
        if: runner.os == 'Windows'
        run: git config --system core.longpaths true

      - name: Checkout codes
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ env.TAG }}
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Vite Plus
        uses: voidzero-dev/setup-vp@2dec1e33f4ab2c6d5bce1b0c4607961bb1a3f7a1 # v1.12.0
        with:
          node-version: 24
          cache: true
          run-install: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: '1.96.0'

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Add Rust target
        env:
          TARGET: ${{ matrix.target }}
        run: rustup target add "$TARGET"

      - name: Build native binding
        working-directory: packages/ox-mf2-napi
        env:
          TARGET: ${{ matrix.target }}
          EXTRA_ARGS: ${{ matrix.extra_args }}
        run: |
          # shellcheck disable=SC2086
          npm exec -- napi build \
            --manifest-path ../../crates/ox_mf2_napi/Cargo.toml \
            --output-dir dist \
            --platform \
            --esm \
            --no-dts-header \
            --js native-binding.js \
            --dts native-binding.d.ts \
            --release \
            --target "$TARGET" \
            $EXTRA_ARGS

      - name: Upload native binding
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          if-no-files-found: error
          name: ox-mf2-napi-${{ matrix.target }}
          path: |
            packages/ox-mf2-napi/dist/*.node
            packages/ox-mf2-napi/dist/native-binding.js
            packages/ox-mf2-napi/dist/native-binding.d.ts

  npm-publish:
    name: Publish npm packages
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - validate
      - build-napi
    if: >-
      always() && (
        (github.event_name == 'push' &&
          needs.validate.result == 'success' &&
          needs.build-napi.result == 'success') ||
        (github.event_name == 'workflow_dispatch' &&
          (inputs.job == 'all' || inputs.job == 'npm-publish') &&
          needs.validate.result == 'success' &&
          needs.build-napi.result == 'success')
      )


    environment: npm-release
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout codes
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ env.TAG }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Vite Plus
        uses: voidzero-dev/setup-vp@2dec1e33f4ab2c6d5bce1b0c4607961bb1a3f7a1 # v1.12.0
        with:
          node-version: 24
          cache: true
          run-install: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: '1.96.0'

      - name: Add wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Print publish tool versions
        run: |
          node --version
          npm --version
          node -e "const v=require('node:child_process').execFileSync('npm',['--version'],{encoding:'utf8'}).trim().split('.').map(Number); if (v[0] < 11 || (v[0] === 11 && v[1] < 5) || (v[0] === 11 && v[1] === 5 && v[2] < 1)) throw new Error('npm >= 11.5.1 is required for Trusted Publishing')"

      - name: Download native bindings
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - name: Build shared package
        run: vp run --no-cache @intlify/ox-mf2-shared#build

      - name: Build WASM package
        run: vp run --no-cache @intlify/ox-mf2-wasm#build

      - name: Prepare N-API release packages
        working-directory: packages/ox-mf2-napi
        run: |
          rm -rf dist ../../release-dir/ox-mf2-napi
          mkdir -p dist ../../release-dir/ox-mf2-napi

          binding_js=$(find ../../artifacts -name native-binding.js | sort | head -n 1)
          binding_dts=$(find ../../artifacts -name native-binding.d.ts | sort | head -n 1)
          if [ -z "$binding_js" ] || [ -z "$binding_dts" ]; then
            echo "native-binding.js/native-binding.d.ts artifact is missing" >&2
            exit 1
          fi
          cp "$binding_js" dist/native-binding.js
          cp "$binding_dts" dist/native-binding.d.ts

          vp run --no-cache @intlify/ox-mf2-napi#build:pack
          npm exec -- napi create-npm-dirs --package-json-path package.json --npm-dir ../../release-dir/ox-mf2-napi
          npm exec -- napi artifacts --package-json-path package.json --output-dir ../../artifacts --npm-dir ../../release-dir/ox-mf2-napi
          npm exec -- napi pre-publish --skip-optional-publish --no-gh-release -t npm --package-json-path package.json --npm-dir ../../release-dir/ox-mf2-napi

      - name: Inspect package contents
        run: node scripts/inspect-binding-packages.mjs

      - name: Publish packages
        run: node scripts/release-npm.mjs publish --npm-dir release-dir/ox-mf2-napi

  published-smoke:
    name: Smoke test published packages
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - npm-publish
    if: >-
      always() && (
        (github.event_name == 'push' &&
          needs.npm-publish.result == 'success') ||
        (github.event_name == 'workflow_dispatch' &&
          (inputs.job == 'published-smoke' ||
            (inputs.job == 'all' && needs.npm-publish.result == 'success')))
      )


    steps:
      - name: Checkout codes
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ env.TAG }}
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Vite Plus
        uses: voidzero-dev/setup-vp@2dec1e33f4ab2c6d5bce1b0c4607961bb1a3f7a1 # v1.12.0
        with:
          node-version: 24
          cache: false
          run-install: false

      - name: Smoke test published packages
        run: node scripts/smoke-published-bindings.mjs "$TAG"

  release-notes:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - published-smoke
    if: >-
      always() && (
        (github.event_name == 'push' &&
          needs.published-smoke.result == 'success') ||
        (github.event_name == 'workflow_dispatch' &&
          (inputs.job == 'release-notes' ||
            (inputs.job == 'all' && needs.published-smoke.result == 'success')))
      )


    permissions:
      contents: write
    steps:
      - name: Checkout main # zizmor: ignore[artipacked]
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Vite Plus
        uses: voidzero-dev/setup-vp@2dec1e33f4ab2c6d5bce1b0c4607961bb1a3f7a1 # v1.12.0
        with:
          node-version: 24
          cache: true
          run-install: false

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists, skipping creation"
          else
            gh release create "$TAG" --generate-notes
          fi

      - name: Sync changelog from GitHub releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: vp exec gh-changelogen --repo=intlify/intlify --tag="$TAG"

      - name: Commit changelog
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7.1.0
        with:
          branch: main
          file_pattern: CHANGELOG.md
          commit_message: 'chore: generate changelog'
