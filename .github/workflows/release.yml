name: Release

on:
  push:
    branches-ignore:
      - '**'
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      job:
        description: 'Which job(s) to run. `all` publishes npm and crates.io packages.'
        type: choice
        required: true
        default: all
        options:
          - all
          - npm-publish
          - crate-publish
          - published-smoke
          - published-cli-smoke
          - published-crate-smoke
          - release-notes
      tag:
        description: 'Existing tag to release, e.g. v0.1.0.'
        type: string
        required: true

env:
  CI: true
  CARGO_TERM_COLOR: always
  TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate:
    name: Validate release tag
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: >-
      github.event_name == 'push' || (github.event_name == 'workflow_dispatch' &&
        (inputs.job == 'all' || inputs.job == 'npm-publish' ||
          inputs.job == 'crate-publish'))


    steps:
      - name: Checkout codes
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.TAG }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Vite Plus
        uses: voidzero-dev/setup-vp@35171c92dd08b67d5a9d3f2a4327800e58396f2a # v1.13.0
        with:
          node-version: 24
          cache: true
          run-install: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: '1.96.1'
          components: rustfmt, clippy

      - name: Add wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Verify release version
        run: node scripts/check-release-version.mjs

      - name: Build packages
        run: vpr build

      - name: Check
        run: vpr --no-cache -v check

      - name: Test
        env:
          VITE_LOG: vite_task=trace
        run: vpr --no-cache -v test

      - name: Inspect package contents
        run: node scripts/inspect-binding-packages.mjs

      - name: Verify CLI schema
        run: vp run schema:cli:check

      - name: Test CLI crate
        run: cargo test -p intlify_cli --all-targets --color always

      - name: Test formatter crate
        run: cargo test -p intlify_format --all-targets --color always

      - name: Check CLI package contents
        run: vp run check:cli-pack

      - name: Smoke test CLI package
        run: vp run test:cli-smoke

  build-napi:
    name: Build @intlify/ox-mf2-napi (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    needs:
      - validate
    if: >-
      github.event_name == 'push' || (github.event_name == 'workflow_dispatch' &&
        (inputs.job == 'all' || inputs.job == 'npm-publish'))


    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: darwin-arm64
            target: aarch64-apple-darwin
            extra_args: ''
          - os: macos-latest
            label: darwin-x64
            target: x86_64-apple-darwin
            extra_args: ''
          - os: ubuntu-latest
            label: linux-x64-gnu
            target: x86_64-unknown-linux-gnu
            extra_args: '--use-napi-cross'
          - os: ubuntu-latest
            label: linux-x64-musl
            target: x86_64-unknown-linux-musl
            extra_args: '--use-napi-cross'
          - os: ubuntu-latest
            label: linux-arm64-gnu
            target: aarch64-unknown-linux-gnu
            extra_args: '--use-napi-cross'
          - os: windows-latest
            label: win32-x64-msvc
            target: x86_64-pc-windows-msvc
            extra_args: ''
    defaults:
      run:
        shell: bash
    steps:
      - name: Enable long paths
        if: runner.os == 'Windows'
        run: git config --system core.longpaths true

      - name: Checkout codes
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.TAG }}
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Vite Plus
        uses: voidzero-dev/setup-vp@35171c92dd08b67d5a9d3f2a4327800e58396f2a # v1.13.0
        with:
          node-version: 24
          cache: true
          run-install: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: '1.96.1'

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Add Rust target
        env:
          TARGET: ${{ matrix.target }}
        run: rustup target add "$TARGET"

      - name: Build native binding
        working-directory: packages/ox-mf2-napi
        env:
          TARGET: ${{ matrix.target }}
          EXTRA_ARGS: ${{ matrix.extra_args }}
        run: |
          # shellcheck disable=SC2086
          npm exec -- napi build \
            --manifest-path ../../crates/ox_mf2_napi/Cargo.toml \
            --output-dir dist \
            --platform \
            --esm \
            --no-dts-header \
            --js native-binding.js \
            --dts native-binding.d.ts \
            --release \
            --target "$TARGET" \
            $EXTRA_ARGS

      - name: Upload native binding
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          if-no-files-found: error
          name: ox-mf2-napi-${{ matrix.target }}
          path: |
            packages/ox-mf2-napi/dist/*.node
            packages/ox-mf2-napi/dist/native-binding.js
            packages/ox-mf2-napi/dist/native-binding.d.ts

  build-format-napi:
    name: Build @intlify/format-napi (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    needs:
      - validate
    if: >-
      github.event_name == 'push' || (github.event_name == 'workflow_dispatch' &&
        (inputs.job == 'all' || inputs.job == 'npm-publish'))


    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: darwin-arm64
            target: aarch64-apple-darwin
            extra_args: ''
          - os: macos-latest
            label: darwin-x64
            target: x86_64-apple-darwin
            extra_args: ''
          - os: ubuntu-latest
            label: linux-x64-gnu
            target: x86_64-unknown-linux-gnu
            extra_args: '--use-napi-cross'
          - os: ubuntu-latest
            label: linux-x64-musl
            target: x86_64-unknown-linux-musl
            extra_args: '--use-napi-cross'
          - os: ubuntu-latest
            label: linux-arm64-gnu
            target: aarch64-unknown-linux-gnu
            extra_args: '--use-napi-cross'
          - os: windows-latest
            label: win32-x64-msvc
            target: x86_64-pc-windows-msvc
            extra_args: ''
    defaults:
      run:
        shell: bash
    steps:
      - name: Enable long paths
        if: runner.os == 'Windows'
        run: git config --system core.longpaths true

      - name: Checkout codes
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.TAG }}
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Vite Plus
        uses: voidzero-dev/setup-vp@35171c92dd08b67d5a9d3f2a4327800e58396f2a # v1.13.0
        with:
          node-version: 24
          cache: true
          run-install: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: '1.96.1'

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Add Rust target
        env:
          TARGET: ${{ matrix.target }}
        run: rustup target add "$TARGET"

      - name: Build formatter native binding
        working-directory: packages/format-napi
        env:
          TARGET: ${{ matrix.target }}
          EXTRA_ARGS: ${{ matrix.extra_args }}
        run: |
          # shellcheck disable=SC2086
          npm exec -- napi build \
            --manifest-path ../../crates/intlify_format_napi/Cargo.toml \
            --output-dir dist \
            --platform \
            --esm \
            --no-dts-header \
            --js native-binding.js \
            --dts native-binding.d.ts \
            --release \
            --target "$TARGET" \
            $EXTRA_ARGS

      - name: Upload formatter native binding
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          if-no-files-found: error
          name: format-napi-${{ matrix.target }}
          path: |
            packages/format-napi/dist/*.node
            packages/format-napi/dist/native-binding.js
            packages/format-napi/dist/native-binding.d.ts

  build-cli-native:
    name: Build @intlify/cli-native (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    needs:
      - validate
    if: >-
      github.event_name == 'push' || (github.event_name == 'workflow_dispatch' &&
        (inputs.job == 'all' || inputs.job == 'npm-publish'))


    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: darwin-arm64
            target: aarch64-apple-darwin
            binary: intlify
          - os: macos-latest
            label: darwin-x64
            target: x86_64-apple-darwin
            binary: intlify
          - os: ubuntu-latest
            label: linux-x64-gnu
            target: x86_64-unknown-linux-gnu
            binary: intlify
          - os: ubuntu-latest
            label: linux-x64-musl
            target: x86_64-unknown-linux-musl
            binary: intlify
          - os: ubuntu-latest
            label: linux-arm64-gnu
            target: aarch64-unknown-linux-gnu
            binary: intlify
          - os: windows-latest
            label: win32-x64-msvc
            target: x86_64-pc-windows-msvc
            binary: intlify.exe
    defaults:
      run:
        shell: bash
    steps:
      - name: Enable long paths
        if: runner.os == 'Windows'
        run: git config --system core.longpaths true

      - name: Checkout codes
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.TAG }}
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Vite Plus
        uses: voidzero-dev/setup-vp@35171c92dd08b67d5a9d3f2a4327800e58396f2a # v1.13.0
        with:
          node-version: 24
          cache: true
          run-install: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: '1.96.1'

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Add Rust target
        env:
          TARGET: ${{ matrix.target }}
        run: rustup target add "$TARGET"

      - name: Install Linux target tools
        if: runner.os == 'Linux'
        env:
          TARGET: ${{ matrix.target }}
        run: |
          sudo apt-get update
          case "$TARGET" in
            x86_64-unknown-linux-musl)
              sudo apt-get install -y musl-tools
              ;;
            aarch64-unknown-linux-gnu)
              sudo apt-get install -y gcc-aarch64-linux-gnu
              ;;
          esac

      - name: Build CLI native binary
        env:
          TARGET: ${{ matrix.target }}
        run: |
          if [ "$TARGET" = "aarch64-unknown-linux-gnu" ]; then
            export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
          fi
          cargo build --release -p intlify_cli --bin intlify --target "$TARGET"

      - name: Stage CLI native binary
        env:
          TARGET: ${{ matrix.target }}
          BINARY: ${{ matrix.binary }}
        run: |
          source_binary="target/$TARGET/release/$BINARY"
          staged_binary="cli-native-bin/$TARGET/$BINARY"
          if [ ! -f "$source_binary" ]; then
            echo "CLI binary is missing at $source_binary" >&2
            exit 1
          fi
          mkdir -p "cli-native-bin/$TARGET"
          cp "$source_binary" "$staged_binary"
          if [ "$BINARY" != "intlify.exe" ]; then
            chmod 755 "$staged_binary"
          fi

      - name: Smoke executable CLI target
        env:
          TARGET: ${{ matrix.target }}
          BINARY: ${{ matrix.binary }}
        run: |
          runnable=$(node - <<'NODE'
          const target = process.env.TARGET
          const platform = process.platform
          const arch = process.arch
          const runnableTargets = new Map([
            ['darwin-arm64', 'aarch64-apple-darwin'],
            ['darwin-x64', 'x86_64-apple-darwin'],
            ['linux-x64', 'x86_64-unknown-linux-gnu'],
            ['linux-x64-musl', 'x86_64-unknown-linux-musl'],
            ['linux-arm64', 'aarch64-unknown-linux-gnu'],
            ['win32-x64', 'x86_64-pc-windows-msvc']
          ])
          const key = platform === 'linux' && target.endsWith('-musl')
            ? `${platform}-${arch}-musl`
            : `${platform}-${arch}`
          process.stdout.write(String(runnableTargets.get(key) === target))
          NODE
          )
          if [ "$runnable" = "true" ]; then
            "cli-native-bin/$TARGET/$BINARY" --version
          else
            echo "Skipping direct execution for $TARGET on $(node -p \"process.platform + '/' + process.arch\")"
          fi

      - name: Prepare CLI native artifact
        run: |
          rm -rf cli-native-artifact
          mkdir -p cli-native-artifact
          cp -R cli-native-bin cli-native-artifact/

      - name: Upload CLI native binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          if-no-files-found: error
          name: cli-native-${{ matrix.target }}
          path: cli-native-artifact

  npm-publish:
    name: Publish npm packages
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - validate
      - build-napi
      - build-format-napi
      - build-cli-native
    if: >-
      always() && (
        (github.event_name == 'push' &&
          needs.validate.result == 'success' &&
          needs.build-napi.result == 'success' &&
          needs.build-format-napi.result == 'success' &&
          needs.build-cli-native.result == 'success') ||
        (github.event_name == 'workflow_dispatch' &&
          (inputs.job == 'all' || inputs.job == 'npm-publish') &&
          needs.validate.result == 'success' &&
          needs.build-napi.result == 'success' &&
          needs.build-format-napi.result == 'success' &&
          needs.build-cli-native.result == 'success')
      )


    # npm Trusted Publishing is configured for this workflow file and the
    # `npm-release` environment. The release flow does not use npm tokens.
    environment: npm-release
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout codes
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.TAG }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Vite Plus
        uses: voidzero-dev/setup-vp@35171c92dd08b67d5a9d3f2a4327800e58396f2a # v1.13.0
        with:
          node-version: 24
          cache: true
          run-install: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: '1.96.1'

      - name: Add wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Print publish tool versions
        run: |
          node --version
          npm --version
          node -e "const v=require('node:child_process').execFileSync('npm',['--version'],{encoding:'utf8'}).trim().split('.').map(Number); if (v[0] < 11 || (v[0] === 11 && v[1] < 5) || (v[0] === 11 && v[1] === 5 && v[2] < 1)) throw new Error('npm >= 11.5.1 is required for Trusted Publishing')"

      - name: Resolve npm dist-tag
        run: |
          node --input-type=module <<'NODE'
          import { appendFileSync } from 'node:fs'
          import { distTagForVersion } from './scripts/release-npm.mjs'

          const tag = process.env.TAG
          if (!tag?.startsWith('v')) {
            throw new Error(`release tag must start with "v": ${String(tag)}`)
          }

          const version = tag.slice(1)
          const distTag = distTagForVersion(version)
          appendFileSync(process.env.GITHUB_ENV, `NPM_DIST_TAG=${distTag}\n`)
          console.log(`Resolved npm dist-tag ${distTag} for ${tag}`)
          NODE

      - name: Download native bindings
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - name: Build shared package
        run: vp run --no-cache @intlify/ox-mf2-shared#build

      - name: Build WASM package
        run: vp run --no-cache @intlify/ox-mf2-wasm#build

      - name: Build formatter WASM package
        run: vp run --no-cache @intlify/format-wasm#build

      - name: Prepare N-API release packages
        working-directory: packages/ox-mf2-napi
        run: |
          rm -rf dist ../../release-dir/ox-mf2-napi
          mkdir -p dist ../../release-dir/ox-mf2-napi

          binding_js=$(find ../../artifacts -path '*/ox-mf2-napi-*/native-binding.js' | sort | head -n 1)
          binding_dts=$(find ../../artifacts -path '*/ox-mf2-napi-*/native-binding.d.ts' | sort | head -n 1)
          if [ -z "$binding_js" ] || [ -z "$binding_dts" ]; then
            echo "native-binding.js/native-binding.d.ts artifact is missing" >&2
            exit 1
          fi
          cp "$binding_js" dist/native-binding.js
          cp "$binding_dts" dist/native-binding.d.ts

          vp run --no-cache @intlify/ox-mf2-napi#build:pack
          npm exec -- napi create-npm-dirs --package-json-path package.json --npm-dir ../../release-dir/ox-mf2-napi
          npm exec -- napi artifacts --package-json-path package.json --output-dir ../../artifacts --npm-dir ../../release-dir/ox-mf2-napi
          npm exec -- napi pre-publish --skip-optional-publish --no-gh-release -t npm --package-json-path package.json --npm-dir ../../release-dir/ox-mf2-napi

      - name: Prepare formatter N-API release packages
        working-directory: packages/format-napi
        run: |
          rm -rf dist ../../release-dir/format-napi
          mkdir -p dist ../../release-dir/format-napi

          binding_js=$(find ../../artifacts -path '*/format-napi-*/native-binding.js' | sort | head -n 1)
          binding_dts=$(find ../../artifacts -path '*/format-napi-*/native-binding.d.ts' | sort | head -n 1)
          if [ -z "$binding_js" ] || [ -z "$binding_dts" ]; then
            echo "formatter native-binding.js/native-binding.d.ts artifact is missing" >&2
            exit 1
          fi
          cp "$binding_js" dist/native-binding.js
          cp "$binding_dts" dist/native-binding.d.ts

          vp run --no-cache @intlify/format-napi#build:pack
          npm exec -- napi create-npm-dirs --package-json-path package.json --npm-dir ../../release-dir/format-napi
          npm exec -- napi artifacts --package-json-path package.json --output-dir ../../artifacts --npm-dir ../../release-dir/format-napi
          npm exec -- napi pre-publish --skip-optional-publish --no-gh-release -t npm --package-json-path package.json --npm-dir ../../release-dir/format-napi

      - name: Inspect package contents
        run: node scripts/inspect-binding-packages.mjs

      - name: Prepare CLI release packages
        run: |
          rm -rf packages/cli-native/bin
          mkdir -p packages/cli-native/bin

          found=0
          while IFS= read -r artifact_dir; do
            cp -R "$artifact_dir"/. packages/cli-native/bin/
            found=1
          done < <(find artifacts -path '*/cli-native-bin' -type d | sort)

          if [ "$found" -ne 1 ]; then
            echo "CLI native binary artifacts are missing" >&2
            exit 1
          fi

          find packages/cli-native/bin -type f ! -name '*.exe' -exec chmod 755 {} \;
          find packages/cli-native/bin -type f | sort

      - name: Validate CLI release packages
        env:
          CLI_NATIVE_PACK_TARGETS: all
        run: |
          vp run schema:cli:check
          vp run check:cli-pack
          vp run test:cli-smoke

      - name: Publish packages with trusted publishing
        env:
          NPM_CONFIG_PROVENANCE: 'true'
        run: node scripts/release-npm.mjs publish --npm-dir release-dir/ox-mf2-napi --npm-dir release-dir/format-napi --tag "$NPM_DIST_TAG"

  crate-publish:
    name: Publish crates.io package
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - validate
    if: >-
      always() && (
        (github.event_name == 'push' &&
          needs.validate.result == 'success') ||
        (github.event_name == 'workflow_dispatch' &&
          (inputs.job == 'all' || inputs.job == 'crate-publish') &&
          needs.validate.result == 'success')
      )


    # crates.io Trusted Publisher is configured for this workflow file and
    # the `crates-release` environment.
    environment: crates-release
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout codes
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.TAG }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Vite Plus
        uses: voidzero-dev/setup-vp@35171c92dd08b67d5a9d3f2a4327800e58396f2a # v1.13.0
        with:
          node-version: 24
          cache: true
          run-install: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: '1.96.1'

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Verify release version
        run: node scripts/check-release-version.mjs

      - name: Print publish tool versions
        run: |
          node --version
          cargo --version

      - name: Inspect crate package contents
        run: cargo package -p ox_mf2_parser --list --locked

      - name: Dry-run publish crate
        run: cargo publish -p ox_mf2_parser --dry-run --locked

      - name: Authenticate crates.io trusted publishing
        id: crates-io-auth
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5

      - name: Publish crate
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-io-auth.outputs.token }}
        run: cargo publish -p ox_mf2_parser --locked

  published-smoke:
    name: Smoke test published npm packages
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - npm-publish
    if: >-
      always() && (
        (github.event_name == 'push' &&
          needs.npm-publish.result == 'success') ||
        (github.event_name == 'workflow_dispatch' &&
          (inputs.job == 'published-smoke' ||
            (inputs.job == 'all' && needs.npm-publish.result == 'success')))
      )


    steps:
      - name: Checkout codes
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.TAG }}
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Vite Plus
        uses: voidzero-dev/setup-vp@35171c92dd08b67d5a9d3f2a4327800e58396f2a # v1.13.0
        with:
          node-version: 24
          cache: false
          run-install: false

      - name: Smoke test published packages
        run: node scripts/smoke-published-bindings.mjs

  published-cli-smoke:
    name: Smoke test published CLI (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    needs:
      - npm-publish
    if: >-
      always() && (
        (github.event_name == 'push' &&
          needs.npm-publish.result == 'success') ||
        (github.event_name == 'workflow_dispatch' &&
          (inputs.job == 'published-cli-smoke' ||
            (inputs.job == 'all' && needs.npm-publish.result == 'success')))
      )


    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout codes
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.TAG }}
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Vite Plus
        uses: voidzero-dev/setup-vp@35171c92dd08b67d5a9d3f2a4327800e58396f2a # v1.13.0
        with:
          node-version: 24
          cache: false
          run-install: false

      - name: Smoke test published CLI
        run: node scripts/smoke-published-cli.mjs

  published-crate-smoke:
    name: Smoke test published crates.io package
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - crate-publish
    if: >-
      always() && (
        (github.event_name == 'push' &&
          needs.crate-publish.result == 'success') ||
        (github.event_name == 'workflow_dispatch' &&
          (inputs.job == 'published-crate-smoke' ||
            (inputs.job == 'all' && needs.crate-publish.result == 'success')))
      )


    steps:
      - name: Checkout codes
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.TAG }}
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Vite Plus
        uses: voidzero-dev/setup-vp@35171c92dd08b67d5a9d3f2a4327800e58396f2a # v1.13.0
        with:
          node-version: 24
          cache: false
          run-install: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: '1.96.1'

      - name: Smoke test published crate
        run: node scripts/smoke-published-crate.mjs

  release-notes:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - published-smoke
      - published-cli-smoke
      - published-crate-smoke
    if: >-
      always() && (
        (github.event_name == 'push' &&
          needs.published-smoke.result == 'success' &&
          needs.published-cli-smoke.result == 'success' &&
          needs.published-crate-smoke.result == 'success') ||
        (github.event_name == 'workflow_dispatch' &&
          (inputs.job == 'release-notes' ||
            (inputs.job == 'all' &&
              needs.published-smoke.result == 'success' &&
              needs.published-cli-smoke.result == 'success' &&
              needs.published-crate-smoke.result == 'success')))
      )


    permissions:
      contents: write
    steps:
      - name: Checkout main # zizmor: ignore[artipacked]
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Vite Plus
        uses: voidzero-dev/setup-vp@35171c92dd08b67d5a9d3f2a4327800e58396f2a # v1.13.0
        with:
          node-version: 24
          cache: true
          run-install: false

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists, skipping creation"
          else
            gh release create "$TAG" --generate-notes
          fi

      - name: Sync changelog from GitHub releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: vp exec gh-changelogen --repo=intlify/intlify --tag="$TAG"

      - name: Commit changelog
        uses: stefanzweifel/git-auto-commit-action@4a55954c782fc1ea30b9056cd3e7a2b40ca8887d # v7.2.0
        with:
          branch: main
          file_pattern: CHANGELOG.md
          commit_message: 'chore: generate changelog'
