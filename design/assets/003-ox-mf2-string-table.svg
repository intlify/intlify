<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 990" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" role="img" aria-labelledby="title desc">
<title id="title">String Table Memory Layout</title><desc id="desc">String offsets are fixed 8-byte records; string data is a raw UTF-8 byte section.</desc><defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" class="arrow-fill"/></marker><style>
      .title { fill:#111827; }.subtitle { fill:#4b5563; }.label { fill:#374151; }.muted { fill:#6b7280; }
      .panel { fill:#ffffff; stroke:#d1d5db; }.surface { fill:#f8fafc; stroke:#9ca3af; }
      .ruler { stroke:#9ca3af; }.ruler-text { fill:#64748b; }.arrow { stroke:#4b5563; }.arrow-fill { fill:#4b5563; }
      .hdr { fill:#2563eb; }.table { fill:#0891b2; }.root { fill:#0d9488; }.source { fill:#059669; }
      .node { fill:#ea580c; }.edge { fill:#0284c7; }.token { fill:#16a34a; }.trivia { fill:#a16207; }
      .diag { fill:#be185d; }.string { fill:#4f46e5; }.raw { fill:#0f766e; }.ext { fill:#9333ea; }
      .pad { fill:#94a3b8; }.bad { fill:#dc2626; }.dark { fill:#111827; }
      @media (prefers-color-scheme: dark) {
        .title { fill:#f8fafc; }.subtitle { fill:#cbd5e1; }.label { fill:#e5e7eb; }.muted { fill:#cbd5e1; }
        .panel { fill:#111827; stroke:#475569; }.surface { fill:#0f172a; stroke:#64748b; }
        .ruler { stroke:#64748b; }.ruler-text { fill:#cbd5e1; }.arrow { stroke:#cbd5e1; }.arrow-fill { fill:#cbd5e1; }
      }
</style></defs>
<rect x="0" y="0" width="1080" height="990" fill="none"/>
<text x="540" y="34" font-size="19" class="title" text-anchor="middle" font-weight="700">String Table Memory Layout</text>
<text x="540" y="57" font-size="12" class="subtitle" text-anchor="middle">String offsets are fixed 8-byte records; string data is a raw UTF-8 byte section.</text>
<rect x="44" y="86" width="992" height="94" rx="6" class="surface" opacity="1"/>
<text x="62" y="116" font-size="13" class="label" font-weight="700">Two-section string table</text>
<text x="62" y="138" font-size="11" class="muted">StringRef.id indexes string_offsets; each 8-byte record slices string_data lazily.</text>
<rect x="44" y="218" width="992" height="164" rx="6" class="surface" opacity="1"/>
<text x="62" y="248" font-size="13" class="label" font-weight="700">SectionRecord memory layout</text>
<text x="62" y="270" font-size="11" class="muted">20-byte section table record; payload offset is buffer-relative and payload starts 8-byte aligned.</text>
