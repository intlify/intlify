<rect x="44" y="286" width="992" height="310" rx="6" class="panel" opacity="1"/>
<text x="62" y="316" font-size="13" class="label" font-weight="700">SourceRecord</text>
<text x="62" y="338" font-size="11" class="muted">Fixed 68-byte record; SourceId is the array index. The first 32 bytes retain the metadata/text-ref prefix.</text>
