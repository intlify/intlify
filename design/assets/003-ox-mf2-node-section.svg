<title id="title">Node Section Memory Layout</title><desc id="desc">NodeRecord is a fixed 24-byte flat-array record with inline span and edge range fields.</desc><defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" class="arrow-fill"/></marker><style>
