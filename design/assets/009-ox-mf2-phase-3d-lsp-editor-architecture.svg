<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 1125" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="14" role="img" aria-labelledby="title desc">
<title id="title">Phase 3D LSP and editor architecture</title>
<desc id="desc">The editor integration owns document URI and version state, request routing, position conversion, and protocol results. Standalone mf2 files use an editor-owned framing adapter. Opt-in catalogs use the shared intlify_resource resolver and registry, whose built-in host adapters parse, extract, map, and validate write-back. Both paths expose an editor-local message entry view to the LSP-agnostic message core. An additive project-backed linker session always resolves definition inventory and producer participation metadata, admits reference-source inventory only when active capabilities require application references, and selects one authoritative snapshot for each physical source group. One open buffer or a byte-identical buffer set may override disk while every URI and version participates in freshness. Unequal buffers select no winner or disk fallback and derive Partial OpenEditorWorld. The session derives scope completeness and calls the shared intlify_linker. After all applicable freshness gates pass, L0 and L1 diagnostics consume LinkOutcome findings, while E0 catalog-key completion consumes an installed M1 typed-key model and its editor-owned model freshness token. The editor consumes neither bundle plans nor exporter, registration, or prune operations.</desc>
