<text x="585" y="172" font-size="12" text-anchor="middle" class="muted">LSP server / extension owns URI · version · requests · positions · protocol results</text>
<text x="585" y="188" font-size="10.8" text-anchor="middle" class="muted">orchestrates an editor-owned standalone path and the shared resource layer</text>

<rect x="330" y="205" width="250" height="65" rx="8" class="entry"/>
<text x="455" y="229" font-size="12.5" font-weight="700" text-anchor="middle" class="white">editor integration routing</text>
<text x="455" y="248" font-size="10.6" text-anchor="middle" class="soft-white">.mf2 precedence · catalog lookup</text>

<rect x="612" y="205" width="228" height="65" rx="8" class="note" stroke-width="1.5"/>
<text x="726" y="229" font-size="12" font-weight="700" text-anchor="middle" class="note-text">configuration inputs</text>
<text x="726" y="248" font-size="10.6" text-anchor="middle" class="note-text">project resources + editor overlay</text>

<!-- Entry production boundary -->
<rect x="330" y="295" width="510" height="210" rx="12" class="adapter-boundary" stroke-width="2"/>
<text x="707" y="317" font-size="11.5" font-weight="700" text-anchor="middle" class="muted">standalone + shared resource entry paths</text>

<rect x="350" y="337" width="220" height="58" rx="8" class="output"/>
<text x="460" y="359" font-size="12.5" font-weight="700" text-anchor="middle" class="white">.mf2 standalone adapter</text>
<text x="460" y="378" font-size="10.6" text-anchor="middle" class="soft-white">editor-owned framing + document map</text>

