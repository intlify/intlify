<rect x="0" y="0" width="1240" height="1125" fill="none"/>

<text x="620" y="42" font-size="24" font-weight="700" text-anchor="middle" class="title">Phase 3D LSP and editor architecture</text>
<text x="620" y="70" font-size="13" text-anchor="middle" class="subtitle">The editor integration orchestrates an editor-owned standalone path and the shared resource catalog path over one entry view.</text>

<!-- Host documents -->
<rect x="46" y="120" width="222" height="350" rx="12" class="panel" stroke-width="2"/>
<text x="157" y="150" font-size="16" font-weight="700" text-anchor="middle" class="label">Host documents</text>
<rect x="70" y="170" width="178" height="40" rx="7" class="entry"/>
<text x="159" y="195" font-size="11.5" font-weight="700" text-anchor="middle" class="white">.mf2 standalone</text>
<rect x="70" y="222" width="178" height="40" rx="7" class="entry"/>
<text x="159" y="247" font-size="10.5" font-weight="700" text-anchor="middle" class="white">JSON catalogs (Tier 1)</text>
<rect x="70" y="274" width="178" height="34" rx="7" class="future"/>
<text x="159" y="296" font-size="11" font-weight="700" text-anchor="middle" class="white">Vue SFC &lt;i18n&gt; (Tier 2)</text>
<rect x="70" y="318" width="178" height="44" rx="7" class="future"/>
<text x="159" y="338" font-size="10.5" font-weight="700" text-anchor="middle" class="white">YAML / JSONC / JSON5</text>
<text x="159" y="353" font-size="10.5" font-weight="700" text-anchor="middle" class="white">(Tier 3)</text>
<rect x="70" y="374" width="178" height="34" rx="7" class="future"/>
<text x="159" y="396" font-size="11" font-weight="700" text-anchor="middle" class="white">XLIFF 1.2 / 2.x (Tier 3)</text>
<text x="157" y="436" font-size="10.8" text-anchor="middle" class="muted">catalog formats are opt-in;</text>
<text x="157" y="454" font-size="10.8" text-anchor="middle" class="muted">plain files are never assumed</text>

<!-- Host tooling note -->
<rect x="46" y="530" width="222" height="130" rx="12" class="note" stroke-width="2"/>
<text x="157" y="560" font-size="12.5" font-weight="700" text-anchor="middle" class="note-text">Host tooling boundary</text>
<text x="157" y="584" font-size="10.8" text-anchor="middle" class="note-text">host syntax errors and host</text>
<text x="157" y="602" font-size="10.8" text-anchor="middle" class="note-text">layout stay with JSON/YAML/XML</text>
<text x="157" y="620" font-size="10.8" text-anchor="middle" class="note-text">language tools and formatters</text>

<!-- Editor workflow composition -->
<rect x="300" y="120" width="570" height="600" rx="14" class="group" stroke-width="2"/>
