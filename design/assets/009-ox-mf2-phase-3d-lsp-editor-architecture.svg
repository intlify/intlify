<!-- Project-backed linker session -->
<rect x="46" y="750" width="1148" height="335" rx="14" class="adapter-boundary" stroke-width="2"/>
<text x="620" y="778" font-size="16" font-weight="700" text-anchor="middle" class="label">Project-backed linker session (additive 014 integration)</text>
<text x="620" y="800" font-size="10.8" text-anchor="middle" class="muted">definition inventory is always resolved; reference-source inventory is capability-gated</text>
<text x="620" y="816" font-size="10.8" text-anchor="middle" class="muted">one authoritative snapshot feeds capability-specific read-only outputs; editor code never reimplements linker semantics</text>

