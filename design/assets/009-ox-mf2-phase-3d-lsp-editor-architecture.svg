<text x="1047" y="234" font-size="10.6" text-anchor="middle" class="soft-white">parser → semantic → rules</text>
<text x="1047" y="250" font-size="10.6" text-anchor="middle" class="soft-white">strict per-entry pipeline</text>

<rect x="930" y="282" width="234" height="58" rx="8" class="rule"/>
<text x="1047" y="304" font-size="12" font-weight="700" text-anchor="middle" class="white">message formatting</text>
<text x="1047" y="322" font-size="10.2" text-anchor="middle" class="soft-white">standalone / catalog: ordinary formatting</text>

<rect x="930" y="358" width="234" height="64" rx="8" class="parser"/>
<text x="1047" y="378" font-size="12" font-weight="700" text-anchor="middle" class="white">core crates</text>
<text x="1047" y="396" font-size="10.6" text-anchor="middle" class="soft-white">ox_mf2_parser · intlify_format · intlify_lint</text>
<text x="1047" y="412" font-size="10.6" text-anchor="middle" class="soft-white">UTF-8 byte spans, no LSP types</text>

<!-- Artifact caches -->
<rect x="900" y="560" width="294" height="130" rx="12" class="cache-boundary" stroke-width="2"/>
