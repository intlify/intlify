<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 680" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="14" role="img" aria-labelledby="title desc">
  <title id="title">ox-mf2 resource extraction pipeline</title>
  <desc id="desc">A complete host source and registry-issued ResolvedHostFormat context pass through byte preflight and registry dispatch, span-preserving host parsing, raw-order candidate traversal, message entry construction, artifact-wide validation, and artifact finalization before one complete ExtractedCatalog is published. Any failure returns one typed resource error and no partial artifact.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" class="arrow-fill" />
    </marker>
    <style>
      .title { fill:#111827; }
      .subtitle { fill:#4b5563; }
      .input { fill:#334155; }
      .dispatch { fill:#475569; }
      .parse { fill:#1d4ed8; }
      .traverse { fill:#0f766e; }
      .build { fill:#b45309; }
      .validate { fill:#7c3aed; }
      .finalize { fill:#475569; }
      .output { fill:#334155; }
      .note { fill:#fff7ed; stroke:#ea580c; }
      .note-title { fill:#9a3412; }
      .note-text { fill:#7c2d12; }
      .arrow { stroke:#64748b; }
      .arrow-fill { fill:#64748b; }
      .white { fill:#ffffff; }
      .soft-white { fill:#e5e7eb; }
      .muted { fill:#4b5563; }
      @media (prefers-color-scheme: dark) {
        .title { fill:#f8fafc; }
        .subtitle { fill:#cbd5e1; }
        .note { fill:#431407; stroke:#fb923c; }
        .note-title { fill:#fdba74; }
        .note-text { fill:#fed7aa; }
        .arrow { stroke:#cbd5e1; }
        .arrow-fill { fill:#cbd5e1; }
        .muted { fill:#cbd5e1; }
      }
    </style>
  </defs>

  <rect x="0" y="0" width="1240" height="680" fill="none" />

  <text x="620" y="42" font-size="24" font-weight="700" text-anchor="middle" class="title">resource extraction pipeline</text>
  <text x="620" y="70" font-size="13" text-anchor="middle" class="subtitle">One public extract call builds and publishes one complete, immutable catalog artifact.</text>

  <rect x="40" y="130" width="190" height="100" rx="10" class="input" />
  <text x="135" y="158" font-size="14" font-weight="700" text-anchor="middle" class="white">Input</text>
  <text x="135" y="182" font-size="11.5" text-anchor="middle" class="soft-white">exact host source</text>
  <text x="135" y="202" font-size="11.5" text-anchor="middle" class="soft-white">ResolvedHostFormat context</text>

  <rect x="270" y="130" width="200" height="100" rx="10" class="dispatch" />
  <text x="370" y="158" font-size="13.5" font-weight="700" text-anchor="middle" class="white">1 · Preflight &amp; dispatch</text>
  <text x="370" y="182" font-size="11.2" text-anchor="middle" class="soft-white">check host_bytes</text>
  <text x="370" y="202" font-size="11.2" text-anchor="middle" class="soft-white">registry selects adapter</text>

  <rect x="510" y="130" width="200" height="100" rx="10" class="parse" />
  <text x="610" y="158" font-size="13.5" font-weight="700" text-anchor="middle" class="white">2 · Parse host syntax</text>
  <text x="610" y="182" font-size="11.2" text-anchor="middle" class="soft-white">span-preserving parse</text>
  <text x="610" y="202" font-size="11.2" text-anchor="middle" class="soft-white">complete syntax · depth limit</text>

  <rect x="750" y="130" width="200" height="100" rx="10" class="traverse" />
  <text x="850" y="158" font-size="13.5" font-weight="700" text-anchor="middle" class="white">3 · Traverse raw order</text>
  <text x="850" y="182" font-size="11.2" text-anchor="middle" class="soft-white">supported structures</text>
  <text x="850" y="202" font-size="11.2" text-anchor="middle" class="soft-white">candidate string leaves</text>

  <rect x="990" y="130" width="210" height="100" rx="10" class="build" />
  <text x="1095" y="158" font-size="13.5" font-weight="700" text-anchor="middle" class="white">4 · Build each entry</text>
  <text x="1095" y="182" font-size="11.2" text-anchor="middle" class="soft-white">identity · unescape · map</text>
  <text x="1095" y="202" font-size="11.2" text-anchor="middle" class="soft-white">raw span · read-only state</text>

  <path d="M 230 180 L 270 180" fill="none" class="arrow" stroke-width="2.3" marker-end="url(#arrow)" />
  <path d="M 470 180 L 510 180" fill="none" class="arrow" stroke-width="2.3" marker-end="url(#arrow)" />
  <path d="M 710 180 L 750 180" fill="none" class="arrow" stroke-width="2.3" marker-end="url(#arrow)" />
  <path d="M 950 180 L 990 180" fill="none" class="arrow" stroke-width="2.3" marker-end="url(#arrow)" />
  <text x="1095" y="116" font-size="10.5" text-anchor="middle" class="muted">repeat for each candidate</text>

  <rect x="900" y="330" width="300" height="100" rx="10" class="validate" />
  <text x="1050" y="358" font-size="13.5" font-weight="700" text-anchor="middle" class="white">5 · Validate the whole builder</text>
  <text x="1050" y="382" font-size="11.2" text-anchor="middle" class="soft-white">budgets · ordered edit-disjoint spans</text>
  <text x="1050" y="402" font-size="11.2" text-anchor="middle" class="soft-white">offset maps · interned identities</text>

  <rect x="560" y="330" width="300" height="100" rx="10" class="finalize" />
  <text x="710" y="358" font-size="13.5" font-weight="700" text-anchor="middle" class="white">6 · Finalize the artifact</text>
  <text x="710" y="382" font-size="11.2" text-anchor="middle" class="soft-white">mint one artifact identity</text>
  <text x="710" y="402" font-size="11.2" text-anchor="middle" class="soft-white">freeze immutable Send + Sync state</text>

  <rect x="220" y="330" width="300" height="100" rx="10" class="output" />
  <text x="370" y="358" font-size="14" font-weight="700" text-anchor="middle" class="white">Output · ExtractedCatalog</text>
  <text x="370" y="382" font-size="11.2" text-anchor="middle" class="soft-white">exact source · ordered MessageEntry[]</text>
  <text x="370" y="402" font-size="11.2" text-anchor="middle" class="soft-white">adapter-private write-back state</text>

  <path d="M 1095 230 L 1095 330" fill="none" class="arrow" stroke-width="2.3" marker-end="url(#arrow)" />
  <path d="M 900 380 L 860 380" fill="none" class="arrow" stroke-width="2.3" marker-end="url(#arrow)" />
  <path d="M 560 380 L 520 380" fill="none" class="arrow" stroke-width="2.3" marker-end="url(#arrow)" />

  <rect x="40" y="510" width="1160" height="110" rx="12" class="note" stroke-width="1.8" />
  <text x="70" y="542" font-size="13.5" font-weight="700" class="note-title">Fail-complete boundary</text>
  <text x="70" y="568" font-size="11.5" class="note-text">Preflight, syntax, unsupported-document, unsupported-entry, limit, or invariant failure returns one typed ResourceError.</text>
  <text x="70" y="592" font-size="11.5" class="note-text">No partial MessageEntry list, occurrence state, identity interner, or ExtractedCatalog is published.</text>
</svg>
