<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 884" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" role="img" aria-labelledby="title desc">
<title id="title">Language Binding Boundaries</title><desc id="desc">N-API, WASM, and future C ABI bindings share the Rust parser crate, Binary AST snapshot buffer, and lazy decoder/accessor model.</desc><defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" class="arrow-fill"/></marker><style>
      .title { fill:#111827; }.subtitle { fill:#4b5563; }.label { fill:#374151; }.muted { fill:#6b7280; }.canvas { fill:#ffffff; }
      .panel { fill:#ffffff; stroke:#d1d5db; }.surface { fill:#f8fafc; stroke:#9ca3af; }
      .ruler { stroke:#9ca3af; }.ruler-text { fill:#64748b; }.arrow { stroke:#4b5563; }.arrow-fill { fill:#4b5563; }
      .hdr { fill:#2563eb; }.table { fill:#0891b2; }.root { fill:#0d9488; }.source { fill:#059669; }
      .node { fill:#ea580c; }.edge { fill:#0284c7; }.token { fill:#16a34a; }.trivia { fill:#a16207; }
      .diag { fill:#be185d; }.string { fill:#4f46e5; }.raw { fill:#0f766e; }.ext { fill:#9333ea; }
      .pad { fill:#94a3b8; }.bad { fill:#dc2626; }.semantic { fill:#7c3aed; }.consumer { fill:#0e7490; }
      @media (prefers-color-scheme: dark) {
        .title { fill:#f8fafc; }.subtitle { fill:#cbd5e1; }.label { fill:#e5e7eb; }.muted { fill:#cbd5e1; }.canvas { fill:#111827; }
        .panel { fill:#111827; stroke:#475569; }.surface { fill:#0f172a; stroke:#64748b; }
        .ruler { stroke:#64748b; }.ruler-text { fill:#cbd5e1; }.arrow { stroke:#cbd5e1; }.arrow-fill { fill:#cbd5e1; }
      }
</style></defs>
<rect x="0" y="0" width="1080" height="884" class="canvas"/>
<text x="540" y="34" font-size="19" class="title" text-anchor="middle" font-weight="700">Language Binding Boundaries</text>
<text x="540" y="57" font-size="12" class="subtitle" text-anchor="middle">Bindings expose lazy result objects over the Rust parser and snapshot boundary.</text>

<rect x="44" y="86" width="992" height="192" rx="6" class="surface"/>
<text x="62" y="116" font-size="13" class="label" font-weight="700">Rust parser boundary</text>
<text x="62" y="138" font-size="11" class="muted">All language bindings call the same Rust parser, snapshot writer, and decoder/accessor implementation.</text>

<rect x="82" y="168" width="246" height="72" rx="4" class="node" opacity="0.82"/>
<text x="205" y="193" font-size="10.5" fill="#fff" text-anchor="middle" font-weight="700">ox_mf2_parser</text>
<text x="205" y="212" font-size="8" fill="#e5e7eb" text-anchor="middle">parse_cst + SemanticModel</text>
<text x="205" y="228" font-size="8" fill="#e5e7eb" text-anchor="middle">parser-owned semantics</text>

<rect x="418" y="168" width="246" height="72" rx="4" class="semantic" opacity="0.82"/>
<text x="541" y="193" font-size="10.5" fill="#fff" text-anchor="middle" font-weight="700">SnapshotWriter</text>
<text x="541" y="212" font-size="8" fill="#e5e7eb" text-anchor="middle">encodes CstTables</text>
<text x="541" y="228" font-size="8" fill="#e5e7eb" text-anchor="middle">measured separately</text>

<rect x="754" y="168" width="246" height="72" rx="4" class="raw" opacity="0.82"/>
<text x="877" y="193" font-size="10.5" fill="#fff" text-anchor="middle" font-weight="700">Binary AST snapshot</text>
<text x="877" y="212" font-size="8" fill="#e5e7eb" text-anchor="middle">versioned shared buffer</text>
<text x="877" y="228" font-size="8" fill="#e5e7eb" text-anchor="middle">decoded lazily by accessors</text>

<path d="M 328 204 L 408 204" fill="none" class="arrow" stroke-width="1.6" marker-end="url(#arrow)"/>
<text x="368" y="190" font-size="8.2" class="ruler-text" text-anchor="middle">encode input</text>
<path d="M 664 204 L 744 204" fill="none" class="arrow" stroke-width="1.6" marker-end="url(#arrow)"/>
<text x="704" y="190" font-size="8.2" class="ruler-text" text-anchor="middle">buffer</text>

<rect x="44" y="312" width="992" height="312" rx="6" class="panel"/>
<text x="62" y="342" font-size="13" class="label" font-weight="700">Binding result objects</text>
<text x="62" y="364" font-size="11" class="muted">Default public APIs return result/accessor objects, not raw bytes or eager JS object trees.</text>

<rect x="82" y="398" width="258" height="112" rx="4" class="consumer" opacity="0.78"/>
<text x="211" y="422" font-size="10.5" fill="#fff" text-anchor="middle" font-weight="700">N-API binding</text>
<text x="211" y="442" font-size="8" fill="#e5e7eb" text-anchor="middle">Node.js / intlify tooling</text>
<text x="211" y="459" font-size="8" fill="#e5e7eb" text-anchor="middle">parseMessage / parseBatch</text>
<text x="211" y="476" font-size="8" fill="#e5e7eb" text-anchor="middle">JS object holds SnapshotRef</text>
<text x="211" y="493" font-size="8" fill="#e5e7eb" text-anchor="middle">RangeError for bad access</text>

<rect x="411" y="398" width="258" height="112" rx="4" class="raw" opacity="0.78"/>
<text x="540" y="422" font-size="10.5" fill="#fff" text-anchor="middle" font-weight="700">Result snapshot owner</text>
<text x="540" y="442" font-size="8" fill="#e5e7eb" text-anchor="middle">internal shared buffer</text>
<text x="540" y="459" font-size="8" fill="#e5e7eb" text-anchor="middle">roots keep { snapshot, id }</text>
<text x="540" y="476" font-size="8" fill="#e5e7eb" text-anchor="middle">diagnostics read from snapshot</text>
<text x="540" y="493" font-size="8" fill="#e5e7eb" text-anchor="middle">no direct buffer mutation</text>

<rect x="740" y="398" width="258" height="112" rx="4" class="consumer" opacity="0.68"/>
<text x="869" y="422" font-size="10.5" fill="#fff" text-anchor="middle" font-weight="700">WASM binding</text>
<text x="869" y="442" font-size="8" fill="#e5e7eb" text-anchor="middle">browser / editor / edge</text>
<text x="869" y="459" font-size="8" fill="#e5e7eb" text-anchor="middle">portable decoder accessors</text>
<text x="869" y="476" font-size="8" fill="#e5e7eb" text-anchor="middle">owned buffer lifetime</text>
<text x="869" y="493" font-size="8" fill="#e5e7eb" text-anchor="middle">error result or thrown error</text>

<path d="M 340 454 L 401 454" fill="none" class="arrow" stroke-width="1.5" marker-end="url(#arrow)"/>
<path d="M 669 454 L 730 454" fill="none" class="arrow" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="82" y="548" width="258" height="46" rx="4" class="source" opacity="0.74"/>
<text x="211" y="568" font-size="8.7" fill="#fff" text-anchor="middle" font-weight="700">external source text</text>
<text x="211" y="584" font-size="7.6" fill="#e5e7eb" text-anchor="middle">used when include_source_text=false</text>

<rect x="411" y="548" width="258" height="46" rx="4" class="string" opacity="0.74"/>
<text x="540" y="568" font-size="8.7" fill="#fff" text-anchor="middle" font-weight="700">sourceSlice(span)</text>
<text x="540" y="584" font-size="7.6" fill="#e5e7eb" text-anchor="middle">context-bound accessor</text>

<rect x="740" y="548" width="258" height="46" rx="4" class="pad" opacity="0.74"/>
<text x="869" y="568" font-size="8.7" fill="#fff" text-anchor="middle" font-weight="700">toBytes()</text>
<text x="869" y="584" font-size="7.6" fill="#e5e7eb" text-anchor="middle">returns copy, never internal buffer</text>

<path d="M 340 571 L 401 571" fill="none" class="arrow" stroke-width="1.4" marker-end="url(#arrow)"/>
<path d="M 669 571 L 730 571" fill="none" class="arrow" stroke-width="1.4" marker-end="url(#arrow)"/>

<rect x="44" y="658" width="992" height="174" rx="6" class="surface"/>
<text x="62" y="688" font-size="13" class="label" font-weight="700">Compatibility and future bindings</text>
<text x="62" y="710" font-size="11" class="muted">C ABI is design preparation in Phase 2; it must share the same snapshot decoder/accessor contract.</text>

<rect x="82" y="746" width="206" height="46" rx="4" class="consumer" opacity="0.78"/>
<text x="185" y="766" font-size="8.7" fill="#fff" text-anchor="middle" font-weight="700">array-like traversal</text>
<text x="185" y="782" font-size="7.6" fill="#e5e7eb" text-anchor="middle">childAt / sourceAt / rootAt</text>

<rect x="316" y="746" width="206" height="46" rx="4" class="raw" opacity="0.72"/>
<text x="419" y="766" font-size="8.7" fill="#fff" text-anchor="middle" font-weight="700">stable ids</text>
<text x="419" y="782" font-size="7.6" fill="#e5e7eb" text-anchor="middle">RootId / NodeId / TokenId</text>

<rect x="554" y="746" width="206" height="46" rx="4" class="bad" opacity="0.72"/>
<text x="657" y="766" font-size="8.7" fill="#fff" text-anchor="middle" font-weight="700">no second parser</text>
<text x="657" y="782" font-size="7.6" fill="#e5e7eb" text-anchor="middle">bindings do not reimplement MF2</text>

<rect x="792" y="746" width="206" height="46" rx="4" class="table" opacity="0.72"/>
<text x="895" y="766" font-size="8.7" fill="#fff" text-anchor="middle" font-weight="700">C ABI friendly</text>
<text x="895" y="782" font-size="7.6" fill="#e5e7eb" text-anchor="middle">future native integrations</text>
</svg>
