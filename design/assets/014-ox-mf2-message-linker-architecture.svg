<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 1100" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="14" role="img" aria-labelledby="title desc">
<title id="title">ox-mf2 message linker architecture</title>
<desc id="desc">Language-specific reference producers emit a Message Reference Artifact, while each completely extracted catalog source passes through intlify_resource to produce one ordered Message Definition Artifact. Those artifacts, a checked one-hop scope mapping table, an execution-derived scope completeness table, a resolved link policy, and a delivery unit graph enter the language-neutral intlify_linker through one stateless request and outcome operation. The linker performs scope resolution, completeness gating, reference resolution, locale fallback resolution, reachability and duplicate placement, and finding generation. It emits linker findings for lint and editor integrations and deterministic Message Bundle Plans. Platform build integrations run the shared syntax gate and create one opaque ValidatedExportBatch tied to the exact plans and selected definitions. Extensible platform exporters accept only that checked batch and return the common ExportArtifactSet or ExportError contract.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
    <path d="M 0 0 L 10 5 L 0 10 z" class="arrow-fill"/>
  </marker>
  <style>
    .title { fill:#111827; }
    .subtitle { fill:#4b5563; }
    .label { fill:#111827; }
    .muted { fill:#4b5563; }
    .panel { fill:#ffffff; stroke:#cbd5e1; }
    .group { fill:#f8fafc; stroke:#cbd5e1; }
    .linker-boundary { fill:#f8fafc; stroke:#64748b; stroke-dasharray:10 8; }
    .producer { fill:#334155; }
    .resource { fill:#0f766e; }
    .policy { fill:#1d4ed8; }
    .graph { fill:#7c3aed; }
    .artifact { fill:#475569; }
    .operation { fill:#e2e8f0; stroke:#cbd5e1; }
    .finding { fill:#b45309; }
    .plan { fill:#7c3aed; }
    .integration { fill:#0369a1; }
    .output { fill:#334155; }
    .arrow { stroke:#64748b; }
    .arrow-fill { fill:#64748b; }
    .white { fill:#ffffff; }
    .soft-white { fill:#e5e7eb; }
    .operation-text { fill:#334155; }
    @media (prefers-color-scheme: dark) {
      .title { fill:#f8fafc; }
      .subtitle { fill:#cbd5e1; }
      .label { fill:#f1f5f9; }
      .muted { fill:#cbd5e1; }
      .panel { fill:#111827; stroke:#475569; }
      .group { fill:#0f172a; stroke:#475569; }
      .linker-boundary { fill:#0f172a; stroke:#94a3b8; }
      .operation { fill:#1e293b; stroke:#475569; }
      .operation-text { fill:#e2e8f0; }
      .arrow { stroke:#cbd5e1; }
      .arrow-fill { fill:#cbd5e1; }
    }
  </style>
</defs>

<rect x="0" y="0" width="1240" height="1100" fill="none"/>

<text x="620" y="42" font-size="24" font-weight="700" text-anchor="middle" class="title">ox-mf2 message linker architecture</text>
<text x="620" y="70" font-size="13" text-anchor="middle" class="subtitle">Language-specific producers and catalog extraction converge on one language-neutral link step.</text>

<!-- Reference producer path -->
<rect x="40" y="110" width="330" height="270" rx="12" class="group" stroke-width="2"/>
<text x="205" y="140" font-size="16" font-weight="700" text-anchor="middle" class="label">Reference producer path</text>

<rect x="65" y="160" width="280" height="105" rx="8" class="producer"/>
<text x="205" y="188" font-size="13" font-weight="700" text-anchor="middle" class="white">Language-specific producers</text>
<text x="205" y="216" font-size="11" text-anchor="middle" class="soft-white">JS/TS AST · Rust macro / binary</text>
<text x="205" y="238" font-size="11" text-anchor="middle" class="soft-white">C/C++ object · WASM scanner</text>

<path d="M 205 265 L 205 300" fill="none" class="arrow" stroke-width="2.3" marker-end="url(#arrow)"/>

<rect x="65" y="300" width="280" height="58" rx="8" class="artifact"/>
<text x="205" y="324" font-size="12.5" font-weight="700" text-anchor="middle" class="white">Message Reference Artifact</text>
<text x="205" y="344" font-size="10.6" text-anchor="middle" class="soft-white">scope · domain · selector · unit</text>

<!-- Catalog definition path -->
<rect x="405" y="110" width="300" height="270" rx="12" class="group" stroke-width="2"/>
<text x="555" y="140" font-size="16" font-weight="700" text-anchor="middle" class="label">Catalog definition path</text>

<rect x="435" y="160" width="240" height="48" rx="8" class="artifact"/>
<text x="555" y="190" font-size="12.5" font-weight="700" text-anchor="middle" class="white">Message catalogs</text>

<path d="M 555 208 L 555 230" fill="none" class="arrow" stroke-width="2.3" marker-end="url(#arrow)"/>

<rect x="435" y="230" width="240" height="58" rx="8" class="resource"/>
<text x="555" y="254" font-size="12.5" font-weight="700" text-anchor="middle" class="white">intlify_resource</text>
<text x="555" y="274" font-size="10.6" text-anchor="middle" class="soft-white">extract · key · locale · span</text>

<path d="M 555 288 L 555 310" fill="none" class="arrow" stroke-width="2.3" marker-end="url(#arrow)"/>

<rect x="435" y="310" width="240" height="58" rx="8" class="artifact"/>
<text x="555" y="334" font-size="12.5" font-weight="700" text-anchor="middle" class="white">Message Definition Artifact</text>
<text x="555" y="354" font-size="10.6" text-anchor="middle" class="soft-white">one complete source · ordered entries</text>

<!-- Resolved mapping and policy inputs -->
<rect x="735" y="140" width="230" height="112" rx="10" class="policy"/>
<text x="850" y="169" font-size="13" font-weight="700" text-anchor="middle" class="white">Resolved link inputs</text>
<text x="850" y="194" font-size="10.2" text-anchor="middle" class="soft-white">scope mapping · completeness</text>
<text x="850" y="215" font-size="10.2" text-anchor="middle" class="soft-white">locales · fallback · coverage</text>
<text x="850" y="236" font-size="10.2" text-anchor="middle" class="soft-white">dynamic · duplicate placement</text>

<rect x="990" y="140" width="210" height="112" rx="10" class="graph"/>
<text x="1095" y="169" font-size="13" font-weight="700" text-anchor="middle" class="white">Delivery Unit Graph</text>
<text x="1095" y="194" font-size="10.8" text-anchor="middle" class="soft-white">opaque unit identities</text>
<text x="1095" y="215" font-size="10.8" text-anchor="middle" class="soft-white">parent → child loading order</text>
<text x="1095" y="236" font-size="10.8" text-anchor="middle" class="soft-white">finite DAG · real roots</text>

<!-- Inputs to the linker -->
<path d="M 205 358 L 205 430" fill="none" class="arrow" stroke-width="2.4" marker-end="url(#arrow)"/>
<path d="M 555 368 L 555 430" fill="none" class="arrow" stroke-width="2.4" marker-end="url(#arrow)"/>
<path d="M 850 252 L 850 405 L 795 405 L 795 430" fill="none" class="arrow" stroke-width="2.4" marker-end="url(#arrow)"/>
<path d="M 1095 252 L 1095 405 L 1015 405 L 1015 430" fill="none" class="arrow" stroke-width="2.4" marker-end="url(#arrow)"/>

<!-- Language-neutral linker -->
<rect x="150" y="430" width="940" height="190" rx="14" class="linker-boundary" stroke-width="2"/>
<text x="620" y="460" font-size="17" font-weight="700" text-anchor="middle" class="label">Language-neutral intlify_linker</text>
<text x="620" y="481" font-size="11.5" text-anchor="middle" class="muted">Stateless link(LinkRequest) → LinkOutcome</text>

<rect x="180" y="500" width="200" height="68" rx="8" class="operation" stroke-width="1.5"/>
<text x="280" y="526" font-size="12" font-weight="700" text-anchor="middle" class="operation-text">Scope + reference</text>
<text x="280" y="548" font-size="10.4" text-anchor="middle" class="operation-text">mapping · completeness · selectors</text>

<rect x="400" y="500" width="200" height="68" rx="8" class="operation" stroke-width="1.5"/>
<text x="500" y="526" font-size="12" font-weight="700" text-anchor="middle" class="operation-text">Locale / fallback</text>
<text x="500" y="548" font-size="10.4" text-anchor="middle" class="operation-text">finite declared locales</text>

<rect x="620" y="500" width="200" height="68" rx="8" class="operation" stroke-width="1.5"/>
<text x="720" y="526" font-size="12" font-weight="700" text-anchor="middle" class="operation-text">Reachability &amp; placement</text>
<text x="720" y="548" font-size="10.4" text-anchor="middle" class="operation-text">per delivery unit</text>

<rect x="840" y="500" width="200" height="68" rx="8" class="operation" stroke-width="1.5"/>
<text x="940" y="526" font-size="12" font-weight="700" text-anchor="middle" class="operation-text">Finding generation</text>
<text x="940" y="548" font-size="10.4" text-anchor="middle" class="operation-text">missing · unused · degraded</text>

<text x="620" y="594" font-size="10.4" text-anchor="middle" class="muted">Consumes only artifacts, scope mappings, completeness, resolved policy, and delivery graph.</text>
<text x="620" y="611" font-size="10.4" text-anchor="middle" class="muted">Performs no source/host parsing or I/O.</text>

<!-- Link outputs -->
<path d="M 620 620 L 620 642 L 360 642 L 360 665" fill="none" class="arrow" stroke-width="2.4" marker-end="url(#arrow)"/>
<path d="M 620 620 L 620 642 L 880 642 L 880 665" fill="none" class="arrow" stroke-width="2.4" marker-end="url(#arrow)"/>

<rect x="190" y="665" width="340" height="68" rx="9" class="finding"/>
<text x="360" y="691" font-size="13" font-weight="700" text-anchor="middle" class="white">Linker findings</text>
<text x="360" y="713" font-size="10.8" text-anchor="middle" class="soft-white">intlify lint · editor integration</text>

<rect x="710" y="665" width="340" height="68" rx="9" class="plan"/>
<text x="880" y="691" font-size="13" font-weight="700" text-anchor="middle" class="white">MessageBundlePlan</text>
<text x="880" y="713" font-size="10.8" text-anchor="middle" class="soft-white">deterministic per locale + delivery unit</text>

<!-- Platform build integrations -->
<path d="M 880 733 L 880 758 L 620 758 L 620 785" fill="none" class="arrow" stroke-width="2.4" marker-end="url(#arrow)"/>

<rect x="80" y="785" width="1080" height="110" rx="12" class="integration"/>
<text x="620" y="813" font-size="15" font-weight="700" text-anchor="middle" class="white">Platform build integrations — orchestration</text>
<text x="620" y="838" font-size="11.5" text-anchor="middle" class="soft-white">Vite / Rolldown plugin · Cargo task / build.rs · CMake integration · WASM and other toolchains</text>
<text x="620" y="862" font-size="10.8" text-anchor="middle" class="soft-white">resolve selected definitions · run shared syntax gate · create opaque ValidatedExportBatch</text>
<text x="620" y="882" font-size="10.2" text-anchor="middle" class="soft-white">one transaction selects one exporter; that exporter may return several artifact kinds</text>

<!-- Platform exporters -->
<path d="M 620 895 L 620 925" fill="none" class="arrow" stroke-width="2.4" marker-end="url(#arrow)"/>
<text x="638" y="914" font-size="10.2" text-anchor="start" class="muted">ValidatedExportBatch</text>

<rect x="60" y="925" width="1120" height="150" rx="12" class="panel" stroke-width="2"/>
<text x="620" y="953" font-size="15" font-weight="700" text-anchor="middle" class="label">Platform exporters — target-native representation</text>
<text x="620" y="975" font-size="10.5" text-anchor="middle" class="muted">Each exporter accepts the checked batch and returns the common ExportArtifactSet / ExportError contract.</text>

<rect x="85" y="995" width="195" height="60" rx="7" class="output"/>
<text x="182" y="1031" font-size="12" font-weight="700" text-anchor="middle" class="white">ESM / JS assets</text>

<rect x="305" y="995" width="195" height="60" rx="7" class="output"/>
<text x="402" y="1031" font-size="12" font-weight="700" text-anchor="middle" class="white">binary blob</text>

<rect x="525" y="995" width="195" height="60" rx="7" class="output"/>
<text x="622" y="1031" font-size="12" font-weight="700" text-anchor="middle" class="white">baked Rust</text>

<rect x="745" y="995" width="195" height="60" rx="7" class="output"/>
<text x="842" y="1031" font-size="12" font-weight="700" text-anchor="middle" class="white">generated C/C++</text>

<rect x="965" y="995" width="190" height="60" rx="7" class="output"/>
<text x="1060" y="1018" font-size="11.5" font-weight="700" text-anchor="middle" class="white">other languages</text>
<text x="1060" y="1038" font-size="9.8" text-anchor="middle" class="soft-white">platform-specific output</text>
</svg>
