<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 1260" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="14" role="img" aria-labelledby="title desc">
<title id="title">ox-mf2 message linker architecture</title>
<desc id="desc">Language-specific reference producers emit a Message Reference Artifact. The M0 producer handles JavaScript and TypeScript syntax. Vue SFC reference production is the next producer phase, while Rust, C and C++, and WASM producers belong to later native milestones. On the catalog side, the intlify_cli project inventory enumerates catalog targets, inspects physical identity, and forms canonically ordered physical-source groups. Host-owned pre-extraction admission validates each already formed group's bindings, profile, and path and alias limits. intlify_resource then extracts that physical source exactly once, and host-owned post-extraction projection performs checked resource-to-contract conversion to produce one ordered Message Definition Artifact. Those artifacts, a checked one-hop scope mapping table, an execution-derived scope completeness table, a resolved link policy, and a delivery unit graph enter the language-neutral intlify_linker through one stateless request and outcome operation. The linker performs scope resolution, completeness gating, reference resolution, locale fallback resolution, reachability and duplicate placement, and finding generation. It emits linker findings, deterministic Message Bundle Plans, and beginning with M1 a parser-independent key-only typed-key model. The shared intlify_export crate runs parser and SemanticModel validation, derives validated MF2 argument-signature information required by typed platform output, creates one opaque ValidatedExportBatch tied to the admitted plans and M1 key models, and owns the exporter trait, common output contracts, and built-in ESM exporter. Platform build integrations construct and select one exporter, invoke it with the checked batch, map the returned ExportArtifactSet, and register the complete output. Extensible platform exporters return only the common ExportArtifactSet or ExportError contract.</desc>
