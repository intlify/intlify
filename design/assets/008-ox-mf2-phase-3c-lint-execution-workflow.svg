<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 780" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="14" role="img" aria-labelledby="title desc">
<title id="title">Phase 3C lint execution workflow</title>
<desc id="desc">The lint command and binding APIs enter the same lintMessage workflow. Parser diagnostics and semantic diagnostics return before configurable rule execution, while clean semantic input flows through the rule registry, enabled built-in rules, deterministic ordering, and result shaping.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
    <path d="M 0 0 L 10 5 L 0 10 z" class="arrow-fill"/>
  </marker>
  <style>
    .title { fill:#111827; }
    .subtitle { fill:#4b5563; }
    .label { fill:#111827; }
    .muted { fill:#4b5563; }
    .panel { fill:#ffffff; stroke:#cbd5e1; }
    .group { fill:#f8fafc; stroke:#cbd5e1; }
    .entry { fill:#334155; }
    .lint { fill:#0f766e; }
    .parser { fill:#1d4ed8; }
    .rule { fill:#7c3aed; }
    .output { fill:#475569; }
    .note { fill:#e2e8f0; stroke:#cbd5e1; }
    .arrow { stroke:#64748b; }
    .dashed { stroke:#64748b; stroke-dasharray:8 7; }
    .arrow-fill { fill:#64748b; }
    .white { fill:#ffffff; }
    .soft-white { fill:#e5e7eb; }
    .note-text { fill:#334155; }
    @media (prefers-color-scheme: dark) {
      .title { fill:#f8fafc; }
      .subtitle { fill:#cbd5e1; }
      .label { fill:#f1f5f9; }
      .muted { fill:#cbd5e1; }
      .panel { fill:#111827; stroke:#475569; }
      .group { fill:#0f172a; stroke:#475569; }
      .note { fill:#1e293b; stroke:#475569; }
      .arrow { stroke:#cbd5e1; }
      .dashed { stroke:#cbd5e1; }
      .arrow-fill { fill:#cbd5e1; }
      .note-text { fill:#cbd5e1; }
    }
  </style>
</defs>

<rect x="0" y="0" width="1320" height="780" fill="none"/>

<text x="660" y="42" font-size="24" font-weight="700" text-anchor="middle" class="title">Phase 3C lint execution workflow</text>
<text x="660" y="70" font-size="13" text-anchor="middle" class="subtitle">Parser and semantic diagnostics stop before configurable rules; clean messages execute enabled built-in rules.</text>

<rect x="44" y="130" width="256" height="148" rx="12" class="panel" stroke-width="2"/>
<text x="172" y="166" font-size="16" font-weight="700" text-anchor="middle" class="label">CLI entry</text>
<rect x="74" y="194" width="196" height="54" rx="8" class="entry"/>
<text x="172" y="216" font-size="12.5" font-weight="700" text-anchor="middle" class="white">intlify lint</text>
<text x="172" y="235" font-size="10.8" text-anchor="middle" class="soft-white">discovery / ignore / framing</text>

<rect x="44" y="344" width="256" height="136" rx="12" class="panel" stroke-width="2"/>
<text x="172" y="380" font-size="16" font-weight="700" text-anchor="middle" class="label">Binding entry</text>
<rect x="74" y="408" width="196" height="34" rx="8" class="entry"/>
<text x="172" y="430" font-size="12" font-weight="700" text-anchor="middle" class="white">N-API / WASM</text>
<text x="172" y="454" font-size="11" text-anchor="middle" class="muted">source-backed call</text>

<rect x="372" y="108" width="594" height="620" rx="14" class="group" stroke-width="2"/>
<text x="669" y="144" font-size="17" font-weight="700" text-anchor="middle" class="label">Message-level lint core</text>
<text x="669" y="168" font-size="12" text-anchor="middle" class="muted">The same core path is used by CLI, N-API, and WASM.</text>

<rect x="506" y="200" width="268" height="54" rx="8" class="lint"/>
<text x="640" y="222" font-size="13.2" font-weight="700" text-anchor="middle" class="white">lint_message(source, options)</text>
<text x="640" y="241" font-size="10.8" text-anchor="middle" class="soft-white">source-backed Rust entry point</text>

<rect x="506" y="286" width="268" height="64" rx="8" class="parser"/>
<text x="640" y="312" font-size="13.2" font-weight="700" text-anchor="middle" class="white">ox_mf2_parser parse</text>
<text x="640" y="333" font-size="10.8" text-anchor="middle" class="soft-white">diagnostics / CstView</text>

<rect x="506" y="372" width="268" height="54" rx="8" class="parser"/>
<text x="640" y="394" font-size="13.2" font-weight="700" text-anchor="middle" class="white">build_semantic_model</text>
<text x="640" y="413" font-size="10.8" text-anchor="middle" class="soft-white">SourceStore + ParseResult</text>

<rect x="506" y="448" width="268" height="54" rx="8" class="parser"/>
<text x="640" y="470" font-size="13.2" font-weight="700" text-anchor="middle" class="white">semantic validation</text>
<text x="640" y="489" font-size="10.8" text-anchor="middle" class="soft-white">parser-owned semantic diagnostics</text>

<rect x="430" y="536" width="210" height="60" rx="8" class="output"/>
<text x="535" y="560" font-size="12.5" font-weight="700" text-anchor="middle" class="white">rule registry</text>
<text x="535" y="579" font-size="10.8" text-anchor="middle" class="soft-white">recommended + lint.rules</text>

<rect x="680" y="536" width="210" height="60" rx="8" class="rule"/>
<text x="785" y="560" font-size="12.5" font-weight="700" text-anchor="middle" class="white">LintRule::check(ctx)</text>
<text x="785" y="579" font-size="10.8" text-anchor="middle" class="soft-white">enabled built-in rules</text>

<rect x="506" y="654" width="268" height="46" rx="8" class="lint"/>
<text x="640" y="672" font-size="12.5" font-weight="700" text-anchor="middle" class="white">deterministic ordering</text>
<text x="640" y="691" font-size="10.8" text-anchor="middle" class="soft-white">result shaping / reporter payload</text>

<rect x="820" y="416" width="124" height="86" rx="8" class="note" stroke-width="1.7"/>
<text x="882" y="445" font-size="11.2" font-weight="700" text-anchor="middle" class="note-text">diagnostic gate</text>
<text x="882" y="466" font-size="9.8" text-anchor="middle" class="note-text">diagnostics return</text>
<text x="882" y="481" font-size="9.8" text-anchor="middle" class="note-text">before rules</text>

<rect x="1048" y="168" width="230" height="308" rx="12" class="panel" stroke-width="2"/>
<text x="1163" y="204" font-size="16" font-weight="700" text-anchor="middle" class="label">Result contract</text>
<rect x="1082" y="230" width="162" height="44" rx="7" class="lint"/>
<text x="1163" y="257" font-size="12.5" font-weight="700" text-anchor="middle" class="white">LintResult</text>
<rect x="1082" y="294" width="162" height="56" rx="7" class="output"/>
<text x="1163" y="316" font-size="12.3" font-weight="700" text-anchor="middle" class="white">diagnostics</text>
<text x="1163" y="335" font-size="10.6" text-anchor="middle" class="soft-white">parser / semantic / lint</text>
<rect x="1082" y="370" width="162" height="44" rx="7" class="output"/>
<text x="1163" y="397" font-size="12" font-weight="700" text-anchor="middle" class="white">text or JSON reporter</text>
<text x="1163" y="444" font-size="11.2" text-anchor="middle" class="muted">Rule execution order is internal;</text>
<text x="1163" y="462" font-size="11.2" text-anchor="middle" class="muted">report order is stable.</text>

<path d="M 270 221 L 356 221 L 356 227 L 506 227" fill="none" class="arrow" stroke-width="2.2" marker-end="url(#arrow)"/>
<path d="M 270 425 L 330 425 L 330 241 L 506 241" fill="none" class="arrow" stroke-width="2.2" marker-end="url(#arrow)"/>

<path d="M 640 254 L 640 286" fill="none" class="arrow" stroke-width="2.2" marker-end="url(#arrow)"/>
<path d="M 640 350 L 640 372" fill="none" class="arrow" stroke-width="2.2" marker-end="url(#arrow)"/>
<path d="M 640 426 L 640 448" fill="none" class="arrow" stroke-width="2.2" marker-end="url(#arrow)"/>
<path d="M 640 502 L 640 518 L 535 518 L 535 536" fill="none" class="arrow" stroke-width="2.2" marker-end="url(#arrow)"/>
<path d="M 640 566 L 680 566" fill="none" class="arrow" stroke-width="2.2" marker-end="url(#arrow)"/>
<path d="M 785 596 L 785 622 L 640 622 L 640 654" fill="none" class="arrow" stroke-width="2.2" marker-end="url(#arrow)"/>

<path d="M 774 318 L 852 318 L 852 416" fill="none" class="dashed" stroke-width="2" marker-end="url(#arrow)"/>
<path d="M 774 475 L 820 475" fill="none" class="dashed" stroke-width="2" marker-end="url(#arrow)"/>
<path d="M 944 459 L 1014 459 L 1014 322 L 1082 322" fill="none" class="dashed" stroke-width="2" marker-end="url(#arrow)"/>
<path d="M 774 677 L 1034 677 L 1034 392 L 1082 392" fill="none" class="arrow" stroke-width="2.2" marker-end="url(#arrow)"/>
</svg>
