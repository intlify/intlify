<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 794" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" role="img" aria-labelledby="title desc">
<title id="title">Roots Section Memory Layout</title><desc id="desc">RootRecord is a fixed 16-byte batch entry point with section-index references.</desc><defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" class="arrow-fill"/></marker><style>
      .title { fill:#111827; }.subtitle { fill:#4b5563; }.label { fill:#374151; }.muted { fill:#6b7280; }
      .panel { fill:#ffffff; stroke:#d1d5db; }.surface { fill:#f8fafc; stroke:#9ca3af; }
      .ruler { stroke:#9ca3af; }.ruler-text { fill:#64748b; }.arrow { stroke:#4b5563; }.arrow-fill { fill:#4b5563; }
      .hdr { fill:#2563eb; }.table { fill:#0891b2; }.root { fill:#0d9488; }.source { fill:#059669; }
      .node { fill:#ea580c; }.edge { fill:#0284c7; }.token { fill:#16a34a; }.trivia { fill:#a16207; }
      .diag { fill:#be185d; }.string { fill:#4f46e5; }.raw { fill:#0f766e; }.ext { fill:#9333ea; }
      .pad { fill:#94a3b8; }.bad { fill:#dc2626; }.dark { fill:#111827; }
      @media (prefers-color-scheme: dark) {
        .title { fill:#f8fafc; }.subtitle { fill:#cbd5e1; }.label { fill:#e5e7eb; }.muted { fill:#cbd5e1; }
        .panel { fill:#111827; stroke:#475569; }.surface { fill:#0f172a; stroke:#64748b; }
        .ruler { stroke:#64748b; }.ruler-text { fill:#cbd5e1; }.arrow { stroke:#cbd5e1; }.arrow-fill { fill:#cbd5e1; }
      }
</style></defs>
<rect x="0" y="0" width="1080" height="794" fill="none"/>
<text x="540" y="34" font-size="19" class="title" text-anchor="middle" font-weight="700">Roots Section Memory Layout</text>
<text x="540" y="57" font-size="12" class="subtitle" text-anchor="middle">RootRecord is a fixed 16-byte batch entry point with section-index references.</text>
<rect x="44" y="86" width="992" height="164" rx="6" class="surface" opacity="1"/>
<text x="62" y="116" font-size="13" class="label" font-weight="700">SectionRecord memory layout</text>
<text x="62" y="138" font-size="11" class="muted">20-byte section table record; payload offset is buffer-relative and payload starts 8-byte aligned.</text>
<path d="M 82 166 L 942 166" fill="none" class="arrow" stroke-width="1.5"/>
<line x1="82" y1="159" x2="82" y2="175" class="ruler" stroke-width="1"/>
<text x="82" y="154" font-size="8" class="ruler-text" text-anchor="middle">0</text>
<line x1="254" y1="159" x2="254" y2="175" class="ruler" stroke-width="1"/>
<text x="254" y="154" font-size="8" class="ruler-text" text-anchor="middle">4</text>
<line x1="426" y1="159" x2="426" y2="175" class="ruler" stroke-width="1"/>
<text x="426" y="154" font-size="8" class="ruler-text" text-anchor="middle">8</text>
<line x1="598" y1="159" x2="598" y2="175" class="ruler" stroke-width="1"/>
<text x="598" y="154" font-size="8" class="ruler-text" text-anchor="middle">12</text>
<line x1="770" y1="159" x2="770" y2="175" class="ruler" stroke-width="1"/>
<text x="770" y="154" font-size="8" class="ruler-text" text-anchor="middle">16</text>
<line x1="856" y1="159" x2="856" y2="175" class="ruler" stroke-width="1"/>
<text x="856" y="154" font-size="8" class="ruler-text" text-anchor="middle">18</text>
<line x1="899" y1="159" x2="899" y2="175" class="ruler" stroke-width="1"/>
<text x="899" y="154" font-size="8" class="ruler-text" text-anchor="middle">19</text>
<line x1="942" y1="159" x2="942" y2="175" class="ruler" stroke-width="1"/>
<text x="942" y="154" font-size="8" class="ruler-text" text-anchor="middle">20</text>
<rect x="82" y="180" width="86" height="50" rx="3" class="table" opacity="0.86"/>
<text x="125.0" y="201" font-size="10" fill="#fff" text-anchor="middle" font-weight="700">kind</text>
<text x="125.0" y="219" font-size="8" fill="#e5e7eb" text-anchor="middle">1 = roots</text>
<rect x="168" y="180" width="86" height="50" rx="3" class="table" opacity="0.68"/>
<text x="211.0" y="201" font-size="10" fill="#fff" text-anchor="middle" font-weight="700">flags</text>
<text x="211.0" y="219" font-size="8" fill="#e5e7eb" text-anchor="middle">required</text>
<rect x="254" y="180" width="172" height="50" rx="3" class="hdr" opacity="0.78"/>
<text x="340.0" y="201" font-size="10" fill="#fff" text-anchor="middle" font-weight="700">offset</text>
<text x="340.0" y="219" font-size="8" fill="#e5e7eb" text-anchor="middle">u32 buffer offset</text>
<rect x="426" y="180" width="172" height="50" rx="3" class="hdr" opacity="0.68"/>
<text x="512.0" y="201" font-size="10" fill="#fff" text-anchor="middle" font-weight="700">byte_len</text>
<text x="512.0" y="219" font-size="8" fill="#e5e7eb" text-anchor="middle">count * record_size</text>
<rect x="598" y="180" width="172" height="50" rx="3" class="hdr" opacity="0.78"/>
<text x="684.0" y="201" font-size="10" fill="#fff" text-anchor="middle" font-weight="700">count</text>
<text x="684.0" y="219" font-size="8" fill="#e5e7eb" text-anchor="middle">u32 records</text>
<rect x="770" y="180" width="86" height="50" rx="3" class="table" opacity="0.72"/>
<text x="813.0" y="201" font-size="10" fill="#fff" text-anchor="middle" font-weight="700">rec_size</text>
<text x="813.0" y="219" font-size="8" fill="#e5e7eb" text-anchor="middle">16 bytes</text>
<rect x="856" y="180" width="43" height="50" rx="3" class="table" opacity="0.58"/>
<text x="877.5" y="201" font-size="9" fill="#fff" text-anchor="middle" font-weight="700">align</text>
<text x="877.5" y="219" font-size="8" fill="#e5e7eb" text-anchor="middle">8</text>
<rect x="899" y="180" width="43" height="50" rx="3" class="pad" opacity="0.58"/>
<text x="920.5" y="201" font-size="9" fill="#fff" text-anchor="middle" font-weight="700">res</text>
<text x="920.5" y="219" font-size="8" fill="#e5e7eb" text-anchor="middle">0</text>
<rect x="44" y="286" width="992" height="190" rx="6" class="panel" opacity="1"/>
<text x="62" y="316" font-size="13" class="label" font-weight="700">RootRecord</text>
<text x="62" y="338" font-size="11" class="muted">Fixed 16-byte batch entry; roots[i] = offset + i * 16.</text>
<path d="M 82 372 L 914 372" fill="none" class="arrow" stroke-width="1.5"/>
<line x1="82" y1="365" x2="82" y2="381" class="ruler" stroke-width="1"/>
<text x="82" y="360" font-size="8" class="ruler-text" text-anchor="middle">0</text>
<line x1="290" y1="365" x2="290" y2="381" class="ruler" stroke-width="1"/>
<text x="290" y="360" font-size="8" class="ruler-text" text-anchor="middle">4</text>
<line x1="498" y1="365" x2="498" y2="381" class="ruler" stroke-width="1"/>
<text x="498" y="360" font-size="8" class="ruler-text" text-anchor="middle">8</text>
<line x1="706" y1="365" x2="706" y2="381" class="ruler" stroke-width="1"/>
<text x="706" y="360" font-size="8" class="ruler-text" text-anchor="middle">12</text>
<line x1="914" y1="365" x2="914" y2="381" class="ruler" stroke-width="1"/>
<text x="914" y="360" font-size="8" class="ruler-text" text-anchor="middle">16</text>
<rect x="82" y="386" width="208" height="58" rx="3" class="root" opacity="0.86"/>
<text x="186.0" y="407" font-size="10" fill="#fff" text-anchor="middle" font-weight="700">root_node</text>
<text x="186.0" y="425" font-size="8" fill="#e5e7eb" text-anchor="middle">u32 NodeId</text>
<rect x="290" y="386" width="208" height="58" rx="3" class="source" opacity="0.78"/>
<text x="394.0" y="407" font-size="10" fill="#fff" text-anchor="middle" font-weight="700">source_id</text>
<text x="394.0" y="425" font-size="8" fill="#e5e7eb" text-anchor="middle">u32 SourceId</text>
<rect x="498" y="386" width="208" height="58" rx="3" class="diag" opacity="0.78"/>
<text x="602.0" y="407" font-size="10" fill="#fff" text-anchor="middle" font-weight="700">diag_start</text>
<text x="602.0" y="425" font-size="8" fill="#e5e7eb" text-anchor="middle">u32 index</text>
<rect x="706" y="386" width="208" height="58" rx="3" class="diag" opacity="0.64"/>
<text x="810.0" y="407" font-size="10" fill="#fff" text-anchor="middle" font-weight="700">diag_count</text>
<text x="810.0" y="425" font-size="8" fill="#e5e7eb" text-anchor="middle">u32 count</text>
<rect x="44" y="514" width="992" height="136" rx="6" class="panel" opacity="1"/>
<text x="62" y="544" font-size="13" class="label" font-weight="700">Cross-section references</text>
<text x="62" y="566" font-size="11" class="muted">RootRecord keeps only section indexes; source metadata and diagnostics remain in their own sections.</text>
<rect x="90" y="598" width="174" height="36" rx="4" class="node" opacity="0.74"/>
<text x="177" y="621" font-size="8.2" fill="#fff" text-anchor="middle" font-weight="700">nodes[root_node]</text>
<rect x="328" y="598" width="174" height="36" rx="4" class="source" opacity="0.74"/>
<text x="415" y="621" font-size="8.2" fill="#fff" text-anchor="middle" font-weight="700">sources[source_id]</text>
<rect x="566" y="598" width="174" height="36" rx="4" class="diag" opacity="0.74"/>
<text x="653" y="621" font-size="8.2" fill="#fff" text-anchor="middle" font-weight="700">diagnostics[start..end]</text>
<rect x="804" y="598" width="174" height="36" rx="4" class="root" opacity="0.74"/>
<text x="891" y="621" font-size="8.2" fill="#fff" text-anchor="middle" font-weight="700">input order</text>
<rect x="44" y="658" width="992" height="106" rx="6" class="surface" opacity="1"/>
<text x="62" y="688" font-size="13" class="label" font-weight="700">Alignment / decoder rules</text>
<rect x="78" y="717" width="206" height="34" rx="4" class="root" opacity="0.72"/>
<text x="181" y="739" font-size="8.5" fill="#fff" text-anchor="middle" font-weight="700">root_node valid NodeId</text>
<rect x="316" y="717" width="206" height="34" rx="4" class="source" opacity="0.72"/>
<text x="419" y="739" font-size="8.5" fill="#fff" text-anchor="middle" font-weight="700">source_id valid SourceId</text>
<rect x="554" y="717" width="206" height="34" rx="4" class="diag" opacity="0.72"/>
<text x="657" y="739" font-size="8.5" fill="#fff" text-anchor="middle" font-weight="700">diagnostics count may be 0</text>
<rect x="792" y="717" width="206" height="34" rx="4" class="table" opacity="0.72"/>
<text x="895" y="739" font-size="8.5" fill="#fff" text-anchor="middle" font-weight="700">layout never changes</text>
