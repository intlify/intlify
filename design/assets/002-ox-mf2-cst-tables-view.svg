<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="780" viewBox="0 0 1120 780" role="img" aria-labelledby="title desc">
  <title id="title">ox-mf2 CST tables and view</title>
  <desc id="desc">Logical CST tree represented by flat indexed tables, read through CstView accessors, with SemanticModel side tables linking back by NodeId and Span.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path class="arrow-fill" d="M 0 0 L 10 5 L 0 10 z" />
    </marker>
    <marker id="semantic-arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path class="semantic-arrow-fill" d="M 0 0 L 10 5 L 0 10 z" />
    </marker>
    <style>
      .bg { fill: none; }
      .frame { fill: #ffffff; stroke: #d1d5db; stroke-width: 1.5; }
      .tree { fill: #eef2ff; stroke: #4f46e5; stroke-width: 1.5; }
      .table { fill: #f8fafc; stroke: #64748b; stroke-width: 1.5; }
      .view { fill: #ecfdf5; stroke: #0f766e; stroke-width: 1.5; }
      .semantic { fill: #faf5ff; stroke: #7e22ce; stroke-width: 1.5; }
      .node { fill: #ffffff; stroke: #6366f1; stroke-width: 1.2; }
      .row { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.2; }
      .row-alt { fill: #f1f5f9; stroke: #cbd5e1; stroke-width: 1.2; }
      .view-item { fill: #ffffff; stroke: #14b8a6; stroke-width: 1.2; }
      .semantic-item { fill: #ffffff; stroke: #a855f7; stroke-width: 1.2; }
      .label { fill: #111827; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 16px; font-weight: 700; letter-spacing: 0; }
      .small { fill: #374151; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 0; }
      .tiny { fill: #4b5563; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 11px; font-weight: 550; letter-spacing: 0; }
      .caption { fill: #4b5563; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 12px; font-weight: 500; letter-spacing: 0; }
      .group-label { fill: #6b7280; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 12px; font-weight: 650; letter-spacing: 0; text-transform: uppercase; }
      .arrow { fill: none; stroke: #374151; stroke-width: 1.8; marker-end: url(#arrow); }
      .arrow-fill { fill: #374151; }
      .semantic-arrow-fill { fill: #7e22ce; }
      .line { fill: none; stroke: #64748b; stroke-width: 1.3; }
      .dash { fill: none; stroke: #7e22ce; stroke-width: 1.5; stroke-dasharray: 7 6; marker-end: url(#semantic-arrow); }
      @media (prefers-color-scheme: dark) {
        .frame { fill: #111827; stroke: #475569; }
        .tree { fill: #1e1b4b; stroke: #818cf8; }
        .table { fill: #1e293b; stroke: #64748b; }
        .view { fill: #134e4a; stroke: #2dd4bf; }
        .semantic { fill: #3b0764; stroke: #c084fc; }
        .node { fill: #312e81; stroke: #a5b4fc; }
        .row { fill: #1e293b; stroke: #475569; }
        .row-alt { fill: #263449; stroke: #475569; }
        .view-item { fill: #0f766e; stroke: #5eead4; }
        .semantic-item { fill: #581c87; stroke: #d8b4fe; }
        .label { fill: #f8fafc; }
        .small { fill: #e5e7eb; }
        .tiny { fill: #cbd5e1; }
        .caption { fill: #cbd5e1; }
        .group-label { fill: #cbd5e1; }
        .arrow { stroke: #cbd5e1; }
        .arrow-fill { fill: #cbd5e1; }
        .semantic-arrow-fill { fill: #c084fc; }
        .line { stroke: #94a3b8; }
        .dash { stroke: #c084fc; }
      }
    </style>
  </defs>

  <rect class="bg" width="1120" height="780" />
  <rect class="frame" x="24" y="24" width="1072" height="732" rx="8" />

  <text class="group-label" x="68" y="62">logical view</text>
  <text class="group-label" x="68" y="386">physical table</text>
  <text class="group-label" x="782" y="386">semantic side tables</text>

  <rect class="tree" x="56" y="82" width="1008" height="260" rx="8" />
  <text class="label" x="560" y="116" text-anchor="middle">Logical CST Tree</text>
  <text class="caption" x="560" y="138" text-anchor="middle">Tools can traverse it as a tree, but nodes are stored as indexed records.</text>

  <rect class="node" x="500" y="154" width="120" height="42" rx="8" />
  <text class="small" x="560" y="172" text-anchor="middle">Root</text>
  <text class="tiny" x="560" y="188" text-anchor="middle">NodeId 0</text>

  <rect class="node" x="500" y="216" width="120" height="42" rx="8" />
  <text class="small" x="560" y="234" text-anchor="middle">Message</text>
  <text class="tiny" x="560" y="250" text-anchor="middle">NodeId 1</text>

  <rect class="node" x="230" y="282" width="120" height="42" rx="8" />
  <text class="small" x="290" y="300" text-anchor="middle">Text</text>
  <text class="tiny" x="290" y="316" text-anchor="middle">NodeId 2</text>

  <rect class="node" x="500" y="282" width="120" height="42" rx="8" />
  <text class="small" x="560" y="300" text-anchor="middle">Expression</text>
  <text class="tiny" x="560" y="316" text-anchor="middle">NodeId 3</text>

  <rect class="node" x="770" y="282" width="120" height="42" rx="8" />
  <text class="small" x="830" y="300" text-anchor="middle">Annotation</text>
  <text class="tiny" x="830" y="316" text-anchor="middle">NodeId 4</text>

  <path class="line" d="M 560 196 L 560 216" />
  <path class="line" d="M 560 258 L 560 270" />
  <path class="line" d="M 290 270 L 830 270" />
  <path class="line" d="M 290 270 L 290 282" />
  <path class="line" d="M 560 270 L 560 282" />
  <path class="line" d="M 830 270 L 830 282" />

  <rect class="table" x="56" y="406" width="660" height="302" rx="8" />
  <text class="label" x="386" y="440" text-anchor="middle">Flat CST tables</text>
  <text class="caption" x="386" y="462" text-anchor="middle">Tree relationships are ranges into flat arrays, not recursive objects.</text>

  <rect class="row-alt" x="86" y="490" width="600" height="34" rx="6" />
  <text class="small" x="104" y="511">nodes</text>
  <text class="tiny" x="190" y="511">0: Root { children: edges[0..1] }</text>
  <text class="tiny" x="462" y="511">1: Message { children: edges[1..4] }</text>

  <rect class="row" x="86" y="532" width="600" height="34" rx="6" />
  <text class="small" x="104" y="553">edges</text>
  <text class="tiny" x="190" y="553">[1, 2, 3, 4]</text>
  <text class="tiny" x="338" y="553">children(node 1) = edges[1..4]</text>

  <rect class="row-alt" x="86" y="574" width="600" height="34" rx="6" />
  <text class="small" x="104" y="595">tokens</text>
  <text class="tiny" x="190" y="595">0: Text, 1: OpenBrace, 2: Identifier, 3: CloseBrace</text>

  <rect class="row" x="86" y="616" width="600" height="34" rx="6" />
  <text class="small" x="104" y="637">trivia</text>
  <text class="tiny" x="190" y="637">whitespace and line breaks by Span</text>

  <rect class="row-alt" x="86" y="658" width="600" height="34" rx="6" />
  <text class="small" x="104" y="679">spans</text>
  <text class="tiny" x="190" y="679">UTF-8 byte offsets, source text stays in SourceStore</text>

  <rect class="view" x="756" y="406" width="308" height="160" rx="8" />
  <text class="label" x="910" y="438" text-anchor="middle">CstView Accessors</text>
  <rect class="view-item" x="784" y="460" width="120" height="30" rx="6" />
  <text class="tiny" x="844" y="480" text-anchor="middle">kind(node)</text>
  <rect class="view-item" x="916" y="460" width="120" height="30" rx="6" />
  <text class="tiny" x="976" y="480" text-anchor="middle">children(node)</text>
  <rect class="view-item" x="784" y="504" width="120" height="30" rx="6" />
  <text class="tiny" x="844" y="524" text-anchor="middle">tokens(node)</text>
  <rect class="view-item" x="916" y="504" width="120" height="30" rx="6" />
  <text class="tiny" x="976" y="524" text-anchor="middle">source_slice(span)</text>

  <rect class="semantic" x="756" y="586" width="308" height="122" rx="8" />
  <text class="label" x="910" y="622" text-anchor="middle">SemanticModel</text>
  <text class="caption" x="910" y="642" text-anchor="middle">side tables, not a replacement tree</text>
  <rect class="semantic-item" x="784" y="656" width="120" height="26" rx="6" />
  <text class="tiny" x="844" y="674" text-anchor="middle">declarations</text>
  <rect class="semantic-item" x="916" y="656" width="120" height="26" rx="6" />
  <text class="tiny" x="976" y="674" text-anchor="middle">references</text>

  <path class="arrow" d="M 716 548 L 754 510" />
  <path class="arrow" d="M 1048 406 C 1080 370 1034 348 930 340" />
  <path class="dash" d="M 804 586 C 744 570 694 548 620 532" />
  <text class="caption" x="910" y="580" text-anchor="middle">NodeId &amp; Span links</text>

  <text class="caption" x="560" y="742" text-anchor="middle">Logical tree traversal is provided by CstView; tables remain compact flat arrays for parser performance and later snapshot encoding.</text>
</svg>
