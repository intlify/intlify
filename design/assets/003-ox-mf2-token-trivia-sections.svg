</style></defs>
<rect x="0" y="0" width="1080" height="1070" fill="none"/>
<text x="540" y="34" font-size="19" class="title" text-anchor="middle" font-weight="700">Token and Trivia Memory Layout</text>
<text x="540" y="57" font-size="12" class="subtitle" text-anchor="middle">Token records carry source spans and trivia ranges; trivia is a separate fixed-record section.</text>
<rect x="44" y="86" width="992" height="84" rx="6" class="surface" opacity="1"/>
<text x="62" y="116" font-size="13" class="label" font-weight="700">Token and Trivia sections</text>
<text x="62" y="138" font-size="11" class="muted">TokenRecord is 36 bytes with a reserved tail; TriviaRecord is 16 bytes and optional.</text>
<rect x="44" y="202" width="992" height="164" rx="6" class="surface" opacity="1"/>
<text x="62" y="232" font-size="13" class="label" font-weight="700">SectionRecord memory layout</text>
<text x="62" y="254" font-size="11" class="muted">20-byte section table record; payload offset is buffer-relative and payload starts 8-byte aligned.</text>
