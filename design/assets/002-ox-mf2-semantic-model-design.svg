<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="760" viewBox="0 0 1120 760" role="img" aria-labelledby="title desc">
  <title id="title">ox-mf2 Phase 1 SemanticModel design</title>
  <desc id="desc">Phase 1 SemanticModel is optionally lowered from CstTables and CstView into side-table records that keep SemanticRef links back to NodeId and UTF-8 byte spans.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path class="arrow-fill" d="M 0 0 L 10 5 L 0 10 z" />
    </marker>
    <marker id="semantic-arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path class="semantic-arrow-fill" d="M 0 0 L 10 5 L 0 10 z" />
    </marker>
    <style>
      .bg { fill: none; }
      .frame { fill: #ffffff; stroke: #d1d5db; stroke-width: 1.5; }
      .table { fill: #f8fafc; stroke: #64748b; stroke-width: 1.5; }
      .view { fill: #ecfdf5; stroke: #0f766e; stroke-width: 1.5; }
      .lowering { fill: #fffbeb; stroke: #b45309; stroke-width: 1.5; }
      .semantic { fill: #faf5ff; stroke: #7e22ce; stroke-width: 1.5; }
      .diagnostic { fill: #fff1f2; stroke: #be123c; stroke-width: 1.5; }
      .boundary { fill: #f8fafc; stroke: #64748b; stroke-width: 1.5; }
      .row { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.2; }
      .row-alt { fill: #f1f5f9; stroke: #cbd5e1; stroke-width: 1.2; }
      .view-item { fill: #ffffff; stroke: #14b8a6; stroke-width: 1.2; }
      .lowering-item { fill: #ffffff; stroke: #d97706; stroke-width: 1.2; }
      .semantic-item { fill: #ffffff; stroke: #a855f7; stroke-width: 1.2; }
      .diagnostic-item { fill: #ffffff; stroke: #fb7185; stroke-width: 1.2; }
      .label { fill: #111827; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 16px; font-weight: 700; letter-spacing: 0; }
      .small { fill: #374151; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 0; }
      .tiny { fill: #4b5563; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 11px; font-weight: 550; letter-spacing: 0; }
      .caption { fill: #4b5563; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 12px; font-weight: 500; letter-spacing: 0; }
      .group-label { fill: #6b7280; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 12px; font-weight: 650; letter-spacing: 0; text-transform: uppercase; }
      .arrow { fill: none; stroke: #374151; stroke-width: 1.8; marker-end: url(#arrow); }
      .semantic-arrow { fill: none; stroke: #7e22ce; stroke-width: 1.8; marker-end: url(#semantic-arrow); }
      .line { fill: none; stroke: #64748b; stroke-width: 1.3; }
      .dash { fill: none; stroke: #64748b; stroke-width: 1.5; stroke-dasharray: 7 6; marker-end: url(#arrow); }
      .arrow-fill { fill: #374151; }
      .semantic-arrow-fill { fill: #7e22ce; }
      @media (prefers-color-scheme: dark) {
        .frame { fill: #111827; stroke: #475569; }
        .table { fill: #1e293b; stroke: #64748b; }
        .view { fill: #134e4a; stroke: #2dd4bf; }
        .lowering { fill: #451a03; stroke: #f59e0b; }
        .semantic { fill: #3b0764; stroke: #c084fc; }
        .diagnostic { fill: #4c0519; stroke: #fb7185; }
        .boundary { fill: #1e293b; stroke: #64748b; }
        .row { fill: #1e293b; stroke: #475569; }
        .row-alt { fill: #263449; stroke: #475569; }
        .view-item { fill: #0f766e; stroke: #5eead4; }
        .lowering-item { fill: #78350f; stroke: #fbbf24; }
        .semantic-item { fill: #581c87; stroke: #d8b4fe; }
        .diagnostic-item { fill: #881337; stroke: #fda4af; }
        .label { fill: #f8fafc; }
        .small { fill: #e5e7eb; }
        .tiny { fill: #cbd5e1; }
        .caption { fill: #cbd5e1; }
        .group-label { fill: #cbd5e1; }
        .arrow { stroke: #cbd5e1; }
        .semantic-arrow { stroke: #c084fc; }
        .line { stroke: #94a3b8; }
        .dash { stroke: #94a3b8; }
        .arrow-fill { fill: #cbd5e1; }
        .semantic-arrow-fill { fill: #c084fc; }
      }
    </style>
  </defs>

  <rect class="bg" width="1120" height="760" />
  <rect class="frame" x="24" y="24" width="1072" height="712" rx="8" />

  <text class="group-label" x="66" y="66">parser output</text>
  <text class="group-label" x="414" y="66">optional lowering phase</text>
  <text class="group-label" x="784" y="66">semantic side tables</text>

  <rect class="table" x="56" y="92" width="300" height="488" rx="8" />
  <text class="label" x="206" y="128" text-anchor="middle">ParseResult syntax data</text>
  <text class="caption" x="206" y="150" text-anchor="middle">Always built before semantic lowering.</text>

  <rect class="row-alt" x="84" y="184" width="244" height="52" rx="6" />
  <text class="small" x="106" y="206">CstTables</text>
  <text class="tiny" x="106" y="222">nodes, edges, tokens, trivia</text>

  <rect class="view-item" x="84" y="252" width="244" height="52" rx="6" />
  <text class="small" x="106" y="274">CstView</text>
  <text class="tiny" x="106" y="290">lazy access to node ranges</text>

  <rect class="row" x="84" y="320" width="244" height="52" rx="6" />
  <text class="small" x="106" y="342">SourceStore links</text>
  <text class="tiny" x="106" y="358">SourceId + UTF-8 byte Span</text>

  <rect class="diagnostic-item" x="84" y="388" width="244" height="52" rx="6" />
  <text class="small" x="106" y="410">Syntax diagnostics</text>
  <text class="tiny" x="106" y="426">available even on recovery</text>

  <rect class="boundary" x="84" y="480" width="244" height="58" rx="6" />
  <text class="small" x="106" y="504">parse_semantic = false</text>
  <text class="tiny" x="106" y="522">semantic: None, no lowering cost</text>

  <rect class="lowering" x="410" y="92" width="300" height="488" rx="8" />
  <text class="label" x="560" y="128" text-anchor="middle">SemanticLowerer</text>
  <text class="caption" x="560" y="150" text-anchor="middle">Runs only when parse_semantic = true.</text>

  <rect class="lowering-item" x="438" y="184" width="244" height="46" rx="6" />
  <text class="small" x="560" y="204" text-anchor="middle">read message mode</text>
  <text class="tiny" x="560" y="220" text-anchor="middle">simple / complex syntax decision</text>

  <rect class="lowering-item" x="438" y="248" width="244" height="46" rx="6" />
  <text class="small" x="560" y="268" text-anchor="middle">derive message kind</text>
  <text class="tiny" x="560" y="284" text-anchor="middle">Pattern or Select data model</text>

  <rect class="lowering-item" x="438" y="312" width="244" height="46" rx="6" />
  <text class="small" x="560" y="332" text-anchor="middle">collect local facts</text>
  <text class="tiny" x="560" y="348" text-anchor="middle">declarations, refs, expressions</text>

  <rect class="lowering-item" x="438" y="376" width="244" height="46" rx="6" />
  <text class="small" x="560" y="396" text-anchor="middle">collect matcher facts</text>
  <text class="tiny" x="560" y="412" text-anchor="middle">selectors, variants, fallback</text>

  <rect class="diagnostic-item" x="438" y="440" width="244" height="46" rx="6" />
  <text class="small" x="560" y="460" text-anchor="middle">syntax-adjacent checks</text>
  <text class="tiny" x="560" y="476" text-anchor="middle">duplicates, missing anchors</text>

  <rect class="boundary" x="438" y="510" width="244" height="44" rx="6" />
  <text class="tiny" x="560" y="529" text-anchor="middle">No complete coverage, locale,</text>
  <text class="tiny" x="560" y="545" text-anchor="middle">or runtime fallback resolution.</text>

  <rect class="semantic" x="768" y="92" width="296" height="488" rx="8" />
  <text class="label" x="916" y="128" text-anchor="middle">SemanticModel</text>
  <text class="caption" x="916" y="150" text-anchor="middle">Owned side tables, not runtime IR.</text>

  <rect class="semantic-item" x="798" y="184" width="112" height="42" rx="6" />
  <text class="tiny" x="854" y="203" text-anchor="middle">mode</text>
  <text class="tiny" x="854" y="218" text-anchor="middle">MessageMode</text>
  <rect class="semantic-item" x="926" y="184" width="108" height="42" rx="6" />
  <text class="tiny" x="980" y="203" text-anchor="middle">kind</text>
  <text class="tiny" x="980" y="218" text-anchor="middle">Pattern/Select</text>

  <rect class="semantic-item" x="798" y="244" width="112" height="42" rx="6" />
  <text class="tiny" x="854" y="263" text-anchor="middle">declarations</text>
  <text class="tiny" x="854" y="278" text-anchor="middle">Vec&lt;Record&gt;</text>
  <rect class="semantic-item" x="926" y="244" width="108" height="42" rx="6" />
  <text class="tiny" x="980" y="263" text-anchor="middle">references</text>
  <text class="tiny" x="980" y="278" text-anchor="middle">Vec&lt;Record&gt;</text>

  <rect class="semantic-item" x="798" y="304" width="112" height="42" rx="6" />
  <text class="tiny" x="854" y="323" text-anchor="middle">patterns</text>
  <text class="tiny" x="854" y="338" text-anchor="middle">expressions</text>
  <rect class="semantic-item" x="926" y="304" width="108" height="42" rx="6" />
  <text class="tiny" x="980" y="323" text-anchor="middle">literals</text>
  <text class="tiny" x="980" y="338" text-anchor="middle">functions</text>

  <rect class="semantic-item" x="798" y="364" width="112" height="42" rx="6" />
  <text class="tiny" x="854" y="383" text-anchor="middle">options</text>
  <text class="tiny" x="854" y="398" text-anchor="middle">attributes</text>
  <rect class="semantic-item" x="926" y="364" width="108" height="42" rx="6" />
  <text class="tiny" x="980" y="383" text-anchor="middle">selectors</text>
  <text class="tiny" x="980" y="398" text-anchor="middle">variants</text>

  <rect class="diagnostic-item" x="798" y="424" width="236" height="42" rx="6" />
  <text class="tiny" x="916" y="443" text-anchor="middle">diagnostics</text>
  <text class="tiny" x="916" y="458" text-anchor="middle">semantic-adjacent, source-linked</text>

  <rect class="boundary" x="798" y="494" width="236" height="44" rx="6" />
  <text class="tiny" x="916" y="513" text-anchor="middle">Every semantic record stores</text>
  <text class="tiny" x="916" y="529" text-anchor="middle">SemanticRef { node, span }.</text>

  <path class="arrow" d="M 356 336 L 408 336" />
  <path class="semantic-arrow" d="M 710 336 L 766 336" />

  <rect class="boundary" x="84" y="630" width="952" height="66" rx="8" />
  <text class="label" x="112" y="660">Phase 1 boundary</text>
  <text class="caption" x="112" y="684">Parser syntax correctness is measured separately from semantic lowering throughput.</text>
  <text class="caption" x="654" y="684">Full data-model validation remains a later validation layer.</text>
</svg>
