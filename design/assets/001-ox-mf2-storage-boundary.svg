<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">ox-mf2 storage boundary</title>
  <desc id="desc">Storage boundary between internal storage formats and stable tool API identifiers and accessors.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path class="arrow-fill" d="M 0 0 L 10 5 L 0 10 z" />
    </marker>
    <style>
      .bg { fill: none; }
      .frame { fill: #ffffff; stroke: #d1d5db; stroke-width: 1.5; }
      .storage { fill: #f8fafc; stroke: #64748b; stroke-width: 1.5; }
      .api { fill: #f8fafc; stroke: #64748b; stroke-width: 1.5; }
      .boundary { fill: #ecfdf5; stroke: #0f766e; stroke-width: 1.5; }
      .item-storage { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.2; }
      .item-api { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.2; }
      .label { fill: #111827; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 16px; font-weight: 700; letter-spacing: 0; }
      .small { fill: #374151; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 14px; font-weight: 600; letter-spacing: 0; }
      .caption { fill: #4b5563; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 12px; font-weight: 500; letter-spacing: 0; }
      .group-label { fill: #6b7280; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 12px; font-weight: 650; letter-spacing: 0; text-transform: uppercase; }
      .arrow { fill: none; stroke: #374151; stroke-width: 1.8; marker-end: url(#arrow); }
      .arrow-fill { fill: #374151; }
      .dashed { fill: none; stroke: #0f766e; stroke-width: 1.5; stroke-dasharray: 8 7; }
      @media (prefers-color-scheme: dark) {
        .frame { fill: #111827; stroke: #475569; }
        .storage { fill: #1e293b; stroke: #64748b; }
        .api { fill: #1e293b; stroke: #64748b; }
        .boundary { fill: #0f766e; stroke: #2dd4bf; }
        .item-storage { fill: #0f172a; stroke: #64748b; }
        .item-api { fill: #0f172a; stroke: #64748b; }
        .label { fill: #f8fafc; }
        .small { fill: #e5e7eb; }
        .caption { fill: #cbd5e1; }
        .group-label { fill: #cbd5e1; }
        .arrow { stroke: #cbd5e1; }
        .arrow-fill { fill: #cbd5e1; }
        .dashed { stroke: #2dd4bf; }
      }
    </style>
  </defs>

  <rect class="bg" width="960" height="520" />
  <rect class="frame" x="24" y="24" width="912" height="472" rx="8" />

  <text class="group-label" x="96" y="68">implementation detail</text>
  <text class="group-label" x="646" y="68">stable tool surface</text>

  <rect class="storage" x="80" y="92" width="300" height="300" rx="8" />
  <text class="label" x="230" y="132" text-anchor="middle">Internal Storage</text>
  <text class="caption" x="230" y="154" text-anchor="middle">replaceable representation</text>

  <rect class="item-storage" x="114" y="188" width="232" height="42" rx="8" />
  <text class="small" x="230" y="214" text-anchor="middle">flat indexed storage</text>

  <rect class="item-storage" x="114" y="250" width="232" height="42" rx="8" />
  <text class="small" x="230" y="276" text-anchor="middle">future binary snapshot</text>

  <rect class="item-storage" x="114" y="312" width="232" height="42" rx="8" />
  <text class="small" x="230" y="338" text-anchor="middle">future mmap-backed storage</text>

  <line class="dashed" x1="480" y1="100" x2="480" y2="394" />

  <rect class="boundary" x="420" y="158" width="120" height="168" rx="8" />
  <text class="label" x="480" y="232" text-anchor="middle">Storage</text>
  <text class="label" x="480" y="256" text-anchor="middle">Boundary</text>
  <text class="caption" x="480" y="282" text-anchor="middle">hide layout changes</text>

  <rect class="api" x="580" y="92" width="300" height="300" rx="8" />
  <text class="label" x="730" y="132" text-anchor="middle">Tool API</text>
  <text class="caption" x="730" y="154" text-anchor="middle">stable access model</text>

  <rect class="item-api" x="614" y="188" width="104" height="42" rx="8" />
  <text class="small" x="666" y="214" text-anchor="middle">NodeId</text>

  <rect class="item-api" x="742" y="188" width="104" height="42" rx="8" />
  <text class="small" x="794" y="214" text-anchor="middle">TokenId</text>

  <rect class="item-api" x="614" y="250" width="104" height="42" rx="8" />
  <text class="small" x="666" y="276" text-anchor="middle">Span</text>

  <rect class="item-api" x="742" y="250" width="104" height="42" rx="8" />
  <text class="small" x="794" y="276" text-anchor="middle">SourceId</text>

  <rect class="item-api" x="614" y="312" width="104" height="42" rx="8" />
  <text class="small" x="666" y="338" text-anchor="middle">accessor</text>

  <rect class="item-api" x="742" y="312" width="104" height="42" rx="8" />
  <text class="small" x="794" y="338" text-anchor="middle">visitor</text>

  <path class="arrow" d="M 380 242 L 418 242" />
  <path class="arrow" d="M 542 242 L 578 242" />

  <text class="caption" x="480" y="430" text-anchor="middle">Tools depend on identifiers and accessors, not on the internal memory layout.</text>
</svg>
