<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 812" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" role="img" aria-labelledby="title desc">
<title id="title">SemanticView Memory Relationship</title><desc id="desc">SemanticView is a derived semantic side view that links back to Binary AST records by NodeId, SourceId, Span, and StringRef.</desc><defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" class="arrow-fill"/></marker><style>
      .title { fill:#111827; }.subtitle { fill:#4b5563; }.label { fill:#374151; }.muted { fill:#6b7280; }
      .panel { fill:#ffffff; stroke:#d1d5db; }.surface { fill:#f8fafc; stroke:#9ca3af; }
      .ruler { stroke:#9ca3af; }.ruler-text { fill:#64748b; }.arrow { stroke:#4b5563; }.arrow-fill { fill:#4b5563; }
      .hdr { fill:#2563eb; }.table { fill:#0891b2; }.root { fill:#0d9488; }.source { fill:#059669; }
      .node { fill:#ea580c; }.edge { fill:#0284c7; }.token { fill:#16a34a; }.trivia { fill:#a16207; }
      .diag { fill:#be185d; }.string { fill:#4f46e5; }.raw { fill:#0f766e; }.ext { fill:#9333ea; }
      .pad { fill:#94a3b8; }.bad { fill:#dc2626; }.semantic { fill:#7c3aed; }.consumer { fill:#0e7490; }
      @media (prefers-color-scheme: dark) {
        .title { fill:#f8fafc; }.subtitle { fill:#cbd5e1; }.label { fill:#e5e7eb; }.muted { fill:#cbd5e1; }
        .panel { fill:#111827; stroke:#475569; }.surface { fill:#0f172a; stroke:#64748b; }
        .ruler { stroke:#64748b; }.ruler-text { fill:#cbd5e1; }.arrow { stroke:#cbd5e1; }.arrow-fill { fill:#cbd5e1; }
      }
</style></defs>
<rect x="0" y="0" width="1080" height="812" fill="none"/>
<text x="540" y="34" font-size="19" class="title" text-anchor="middle" font-weight="700">SemanticView Memory Relationship</text>
<text x="540" y="57" font-size="12" class="subtitle" text-anchor="middle">Derived semantic facts stay separate from the lossless Binary AST snapshot.</text>

<rect x="44" y="86" width="992" height="190" rx="6" class="surface"/>
<text x="62" y="116" font-size="13" class="label" font-weight="700">Boundary model</text>
<text x="62" y="138" font-size="11" class="muted">Binary AST remains the cross-language CST product; SemanticView is a side view built by Rust core.</text>

<rect x="82" y="168" width="244" height="72" rx="4" class="node" opacity="0.82"/>
<text x="204" y="193" font-size="10.5" fill="#fff" text-anchor="middle" font-weight="700">Binary AST Snapshot</text>
<text x="204" y="212" font-size="8" fill="#e5e7eb" text-anchor="middle">roots / nodes / tokens / trivia</text>
<text x="204" y="228" font-size="8" fill="#e5e7eb" text-anchor="middle">source spans are source of truth</text>

<rect x="418" y="168" width="244" height="72" rx="4" class="semantic" opacity="0.82"/>
<text x="540" y="193" font-size="10.5" fill="#fff" text-anchor="middle" font-weight="700">Rust SemanticModel</text>
<text x="540" y="212" font-size="8" fill="#e5e7eb" text-anchor="middle">lowered from validated CST</text>
<text x="540" y="228" font-size="8" fill="#e5e7eb" text-anchor="middle">single semantic implementation</text>

<rect x="754" y="168" width="244" height="72" rx="4" class="consumer" opacity="0.82"/>
<text x="876" y="193" font-size="10.5" fill="#fff" text-anchor="middle" font-weight="700">SemanticView</text>
<text x="876" y="212" font-size="8" fill="#e5e7eb" text-anchor="middle">read-only semantic facts</text>
<text x="876" y="228" font-size="8" fill="#e5e7eb" text-anchor="middle">links back to NodeId and Span</text>

<path d="M 326 204 L 408 204" fill="none" class="arrow" stroke-width="1.6" marker-end="url(#arrow)"/>
<text x="367" y="190" font-size="8.2" class="ruler-text" text-anchor="middle">lower</text>
<path d="M 662 204 L 744 204" fill="none" class="arrow" stroke-width="1.6" marker-end="url(#arrow)"/>
<text x="703" y="190" font-size="8.2" class="ruler-text" text-anchor="middle">expose</text>

<rect x="44" y="310" width="992" height="236" rx="6" class="panel"/>
<text x="62" y="340" font-size="13" class="label" font-weight="700">Semantic fact tables</text>
<text x="62" y="362" font-size="11" class="muted">Conceptual compact tables; they are not v1 Binary AST core sections.</text>

<rect x="82" y="394" width="194" height="62" rx="4" class="semantic" opacity="0.78"/>
<text x="179" y="416" font-size="9.5" fill="#fff" text-anchor="middle" font-weight="700">DeclarationFact[]</text>
<text x="179" y="434" font-size="7.8" fill="#e5e7eb" text-anchor="middle">node_id | name | kind</text>
<text x="179" y="449" font-size="7.8" fill="#e5e7eb" text-anchor="middle">span links to source</text>

<rect x="316" y="394" width="194" height="62" rx="4" class="semantic" opacity="0.68"/>
<text x="413" y="416" font-size="9.5" fill="#fff" text-anchor="middle" font-weight="700">ReferenceFact[]</text>
<text x="413" y="434" font-size="7.8" fill="#e5e7eb" text-anchor="middle">node_id | target_id</text>
<text x="413" y="449" font-size="7.8" fill="#e5e7eb" text-anchor="middle">unresolved stays diagnostic</text>

<rect x="550" y="394" width="194" height="62" rx="4" class="semantic" opacity="0.78"/>
<text x="647" y="416" font-size="9.5" fill="#fff" text-anchor="middle" font-weight="700">SelectorFact[]</text>
<text x="647" y="434" font-size="7.8" fill="#e5e7eb" text-anchor="middle">selector_node | key range</text>
<text x="647" y="449" font-size="7.8" fill="#e5e7eb" text-anchor="middle">option / variable metadata</text>

<rect x="784" y="394" width="194" height="62" rx="4" class="semantic" opacity="0.68"/>
<text x="881" y="416" font-size="9.5" fill="#fff" text-anchor="middle" font-weight="700">VariantFact[]</text>
<text x="881" y="434" font-size="7.8" fill="#e5e7eb" text-anchor="middle">variant_node | selector set</text>
<text x="881" y="449" font-size="7.8" fill="#e5e7eb" text-anchor="middle">fallback / coverage bits</text>

<rect x="82" y="486" width="426" height="34" rx="4" class="node" opacity="0.72"/>
<text x="295" y="508" font-size="8.5" fill="#fff" text-anchor="middle" font-weight="700">NodeId / SourceId / Span point back into Binary AST records</text>

<rect x="572" y="486" width="406" height="34" rx="4" class="string" opacity="0.72"/>
<text x="775" y="508" font-size="8.5" fill="#fff" text-anchor="middle" font-weight="700">StringRef points into snapshot string table when text is needed</text>

<path d="M 276 425 L 316 425" fill="none" class="arrow" stroke-width="1.4" marker-end="url(#arrow)"/>
<path d="M 510 425 L 550 425" fill="none" class="arrow" stroke-width="1.4" marker-end="url(#arrow)"/>
<path d="M 744 425 L 784 425" fill="none" class="arrow" stroke-width="1.4" marker-end="url(#arrow)"/>
<path d="M 295 486 C 295 468 530 468 530 456" fill="none" class="arrow" stroke-width="1.2" marker-end="url(#arrow)"/>
<path d="M 775 486 C 775 468 820 468 820 456" fill="none" class="arrow" stroke-width="1.2" marker-end="url(#arrow)"/>

<rect x="44" y="580" width="992" height="172" rx="6" class="surface"/>
<text x="62" y="610" font-size="13" class="label" font-weight="700">Consumers and invariants</text>
<text x="62" y="632" font-size="11" class="muted">Tools combine lazy Binary AST access with semantic facts; missing facts do not change CST decoding.</text>

<rect x="82" y="666" width="190" height="46" rx="4" class="consumer" opacity="0.78"/>
<text x="177" y="693" font-size="9" fill="#fff" text-anchor="middle" font-weight="700">linter</text>

<rect x="322" y="666" width="190" height="46" rx="4" class="consumer" opacity="0.68"/>
<text x="417" y="693" font-size="9" fill="#fff" text-anchor="middle" font-weight="700">compiler</text>

<rect x="562" y="666" width="190" height="46" rx="4" class="consumer" opacity="0.78"/>
<text x="657" y="693" font-size="9" fill="#fff" text-anchor="middle" font-weight="700">validation</text>

<rect x="802" y="666" width="190" height="46" rx="4" class="bad" opacity="0.72"/>
<text x="897" y="693" font-size="9" fill="#fff" text-anchor="middle" font-weight="700">no second parser</text>

<path d="M 876 240 C 876 282 876 338 876 384" fill="none" class="arrow" stroke-width="1.4" marker-end="url(#arrow)"/>
</svg>
